<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Explorer – WebControl HQ</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    /* ── Layout ── */
    #db-layout { display:flex; flex:1; overflow:hidden; }

    /* ── Left Sidebar ── */
    #db-sidebar {
      width:260px; flex-shrink:0;
      background:var(--bg2); border-right:1px solid var(--border);
      display:flex; flex-direction:column; overflow:hidden;
    }
    #db-sidebar-head {
      padding:12px 12px 8px; border-bottom:1px solid var(--border); flex-shrink:0;
      display:flex; gap:6px; align-items:center;
    }
    #db-sidebar-search {
      flex:1; padding:7px 10px; font-size:12px;
      background:var(--surface); border:1px solid var(--border);
      border-radius:8px; color:var(--text1); font-family:inherit; outline:none;
    }
    #db-sidebar-search:focus { border-color:var(--accent2); }
    #db-table-list { flex:1; overflow-y:auto; padding:6px 6px 12px; }

    /* DB Group */
    .db-group { margin-bottom:4px; }
    .db-group-header {
      display:flex; align-items:center; gap:7px;
      padding:7px 8px; border-radius:8px; cursor:pointer;
      user-select:none; transition:background .12s;
      margin-bottom:2px;
    }
    .db-group-header:hover { background:var(--surface); }
    .db-group-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .db-group-label { font-size:11px; font-weight:800; font-family:'Space Mono',monospace; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .db-group-type { font-size:9px; padding:1px 6px; border-radius:8px; background:rgba(255,255,255,.07); color:var(--text3); font-family:'Space Mono',monospace; }
    .db-group-chevron { font-size:10px; color:var(--text3); transition:transform .15s; flex-shrink:0; }
    .db-group-chevron.open { transform:rotate(90deg); }
    .db-group-tables { padding-left:8px; display:none; }
    .db-group-tables.open { display:block; }

    /* Table item */
    .db-table-item {
      display:flex; align-items:center; gap:8px;
      padding:6px 8px; border-radius:7px; cursor:pointer;
      transition:background .12s; border:1px solid transparent;
      margin-bottom:1px;
    }
    .db-table-item:hover { background:var(--surface); }
    .db-table-item.active { background:var(--surface2); border-color:var(--border2); }
    .db-table-item.active .dbt-name { color:var(--accent2); }
    .dbt-icon { font-size:13px; flex-shrink:0; }
    .dbt-name { font-size:11px; font-weight:700; color:var(--text1); flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-family:'Space Mono',monospace; }
    .dbt-count { font-size:10px; font-family:'Space Mono',monospace; color:var(--text3); background:var(--surface); border:1px solid var(--border); padding:1px 5px; border-radius:10px; flex-shrink:0; }
    .dbt-loading { font-size:10px; color:var(--text3); padding:4px 8px; font-family:'Space Mono',monospace; }
    .db-group-error { font-size:10px; color:var(--red); padding:4px 8px; font-family:'Space Mono',monospace; display:flex; align-items:center; gap:6px; }
    .db-key-btn {
      display:flex; align-items:center; gap:5px; width:100%; padding:6px 8px;
      border:1px dashed var(--border); border-radius:7px; background:none; cursor:pointer;
      font-size:10px; font-family:'Space Mono',monospace; color:var(--text3);
      transition:border-color .12s; margin-bottom:2px;
    }
    .db-key-btn:hover { border-color:var(--accent2); color:var(--accent2); }

    /* ── Main area ── */
    #db-main { flex:1; overflow:hidden; display:flex; flex-direction:column; }
    #db-toolbar {
      display:flex; align-items:center; gap:8px; padding:11px 18px;
      border-bottom:1px solid var(--border); flex-shrink:0; flex-wrap:wrap;
      background:var(--bg2);
    }
    #db-toolbar input[type="text"] {
      padding:6px 11px; font-size:12px; background:var(--surface);
      border:1px solid var(--border); border-radius:7px; color:var(--text1);
      font-family:inherit; outline:none; width:180px;
    }
    #db-toolbar input:focus { border-color:var(--accent2); }
    #db-toolbar select {
      padding:6px 9px; font-size:12px; background:var(--surface);
      border:1px solid var(--border); border-radius:7px; color:var(--text1);
      font-family:inherit; outline:none; cursor:pointer;
    }
    .db-source-badge {
      font-size:9px; font-family:'Space Mono',monospace; padding:2px 8px;
      border-radius:10px; font-weight:700;
    }
    .db-table-wrap { flex:1; overflow:auto; }
    .db-empty {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      height:100%; color:var(--text3); font-family:'Space Mono',monospace; font-size:12px; gap:10px;
    }

    /* ── Table ── */
    .db-tbl { width:100%; border-collapse:collapse; font-size:12px; }
    .db-tbl thead { position:sticky; top:0; z-index:2; }
    .db-tbl th {
      background:var(--bg2); border-bottom:1px solid var(--border);
      padding:9px 12px; text-align:left; font-size:10px; font-weight:700;
      font-family:'Space Mono',monospace; letter-spacing:.08em; text-transform:uppercase;
      color:var(--text3); white-space:nowrap; cursor:pointer; user-select:none; transition:color .12s;
    }
    .db-tbl th:hover { color:var(--accent2); }
    .db-tbl th.sorted { color:var(--accent2); }
    .db-tbl th .sort-arrow { margin-left:4px; opacity:.6; }
    .db-tbl td {
      padding:9px 12px; border-bottom:1px solid rgba(35,46,66,.4);
      vertical-align:top; max-width:280px;
    }
    .db-tbl tr:hover td { background:rgba(30,38,54,.5); }
    .db-cell-val { font-family:'Space Mono',monospace; font-size:11px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:block; max-width:260px; }
    .db-cell-val.long { cursor:pointer; }
    .db-cell-val.long:hover { color:var(--accent2); }
    .db-cell-null { font-style:italic; color:var(--text3); font-size:10px; font-family:'Space Mono',monospace; }
    .db-cell-bool-1 { color:var(--green); font-weight:700; }
    .db-cell-bool-0 { color:var(--text3); }
    .db-row-actions { display:flex; gap:4px; opacity:0; transition:opacity .12s; flex-shrink:0; }
    .db-tbl tr:hover .db-row-actions { opacity:1; }
    .db-act-btn { width:24px; height:24px; border-radius:6px; border:none; background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text2); transition:background .1s; }
    .db-act-btn:hover { background:rgba(255,255,255,.1); }
    .db-act-btn.del:hover { background:rgba(239,68,68,.15); color:var(--red); }

    /* ── Pagination ── */
    #db-pagination {
      display:flex; align-items:center; gap:8px; padding:10px 18px;
      border-top:1px solid var(--border); flex-shrink:0;
      background:var(--bg2); font-size:11px; font-family:'Space Mono',monospace; color:var(--text3);
    }
    .pg-btn { padding:4px 10px; font-size:10px; border:1px solid var(--border); border-radius:6px; background:var(--surface); color:var(--text2); cursor:pointer; font-family:'Space Mono',monospace; transition:border-color .12s; }
    .pg-btn:hover:not(:disabled) { border-color:var(--accent2); color:var(--accent2); }
    .pg-btn:disabled { opacity:.35; cursor:not-allowed; }

    /* ── Schema panel ── */
    #db-schema-panel { width:270px; flex-shrink:0; border-left:1px solid var(--border); background:var(--bg2); display:none; flex-direction:column; overflow:hidden; }
    #db-schema-panel.open { display:flex; }
    .schema-head { padding:12px 14px; border-bottom:1px solid var(--border); flex-shrink:0; font-size:11px; font-weight:700; font-family:'Space Mono',monospace; color:var(--text2); display:flex; align-items:center; justify-content:space-between; }
    .schema-list { flex:1; overflow-y:auto; padding:8px 12px; }
    .schema-col { display:flex; align-items:baseline; gap:6px; padding:6px 0; border-bottom:1px solid rgba(35,46,66,.5); }
    .schema-col-name { font-size:11px; font-weight:700; font-family:'Space Mono',monospace; color:var(--text1); flex:1; }
    .schema-col-type { font-size:10px; font-family:'Space Mono',monospace; color:var(--accent2); }
    .schema-col-pk { font-size:9px; padding:1px 5px; background:rgba(245,158,11,.15); color:var(--yellow); border-radius:4px; }
    .schema-col-nn { font-size:9px; padding:1px 5px; background:rgba(239,68,68,.1); color:var(--red); border-radius:4px; }

    /* ── Modals ── */
    .db-overlay { display:none; position:fixed; inset:0; z-index:9000; background:rgba(0,0,0,.8); backdrop-filter:blur(4px); align-items:center; justify-content:center; }
    .db-overlay.open { display:flex; }
    .db-modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; width:min(860px,97vw); max-height:90vh; display:flex; flex-direction:column; overflow:hidden; }
    .db-modal-sm { width:min(480px,97vw); }
    .db-modal-head { display:flex; align-items:center; justify-content:space-between; padding:18px 24px; border-bottom:1px solid var(--border); flex-shrink:0; }
    .db-modal-title { font-size:14px; font-weight:800; }
    .db-modal-body { flex:1; overflow-y:auto; padding:20px 24px; }
    .db-modal-foot { display:flex; gap:8px; justify-content:flex-end; padding:14px 24px; border-top:1px solid var(--border); flex-shrink:0; }
    .db-field-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
    .db-field-group { display:flex; flex-direction:column; gap:4px; }
    .db-field-group.full { grid-column:1/-1; }
    .db-field-group label { font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--text3); font-family:'Space Mono',monospace; display:flex; align-items:center; gap:6px; }
    .db-field-group .pk-badge { color:var(--yellow); font-size:8px; }
    .db-field-group input, .db-field-group textarea, .db-field-group select { background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text1); font-family:'Space Mono',monospace; font-size:11px; padding:8px 10px; outline:none; width:100%; box-sizing:border-box; }
    .db-field-group textarea { min-height:90px; resize:vertical; line-height:1.5; }
    .db-field-group input:focus, .db-field-group textarea:focus { border-color:var(--accent2); }
    .db-field-group input:read-only { opacity:.45; cursor:not-allowed; }
    .db-detail-row { display:flex; gap:0; border-bottom:1px solid rgba(35,46,66,.5); padding:8px 0; }
    .db-detail-key { flex-shrink:0; width:180px; font-size:10px; font-weight:700; font-family:'Space Mono',monospace; text-transform:uppercase; color:var(--text3); padding-top:2px; letter-spacing:.06em; }
    .db-detail-val { flex:1; font-size:12px; font-family:'Space Mono',monospace; color:var(--text1); word-break:break-all; white-space:pre-wrap; line-height:1.6; }

    /* ── Supabase config modal ── */
    .sb-config-hint { font-size:11px; color:var(--text3); line-height:1.7; margin-bottom:16px; }
    .sb-config-hint code { background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:1px 5px; font-family:'Space Mono',monospace; color:var(--accent2); font-size:10px; }
    .sb-key-preview { font-size:10px; font-family:'Space Mono',monospace; color:var(--text3); margin-top:4px; }

    /* ── Toast ── */
    #db-toast { position:fixed; bottom:20px; right:20px; z-index:9999; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 16px; font-size:12px; font-family:'Space Mono',monospace; display:none; align-items:center; gap:8px; box-shadow:0 8px 32px rgba(0,0,0,.4); }
    #db-toast.show { display:flex; }
    #db-toast.ok  { border-color:rgba(34,197,94,.3); color:var(--green); }
    #db-toast.err { border-color:rgba(239,68,68,.3); color:var(--red); }

    .btn-add-row { background:rgba(34,197,94,.1); border-color:rgba(34,197,94,.3); color:var(--green); }
    .btn-add-row:hover { background:rgba(34,197,94,.2); }
    #db-welcome { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text3); gap:12px; }
    .db-welcome-grid { display:flex; gap:10px; margin-top:8px; flex-wrap:wrap; justify-content:center; }
    .db-welcome-db { padding:8px 14px; border:1px solid var(--border); border-radius:10px; font-size:11px; font-family:'Space Mono',monospace; color:var(--text3); display:flex; align-items:center; gap:6px; }
    .db-welcome-dot { width:7px; height:7px; border-radius:50%; }
  </style>
</head>
<body>
<div id="layout">
  <div id="main">

    <div class="page-header">
      <div class="page-title" style="display:flex;align-items:center;gap:10px">
        <i data-lucide="database" style="width:20px;height:20px;color:var(--accent2)"></i>
        Data Explorer
      </div>
      <div class="page-sub">5 Datenbanken · D1 (Cloudflare) · Supabase (PostgreSQL)</div>
    </div>

    <div id="db-layout">

      <!-- ── Left Sidebar ── -->
      <div id="db-sidebar">
        <div id="db-sidebar-head">
          <input id="db-sidebar-search" type="text" placeholder="Tabelle suchen…" oninput="filterSidebar()">
          <button class="btn btn-ghost btn-sm" onclick="refreshAll()" title="Alle neu laden" style="padding:6px;flex-shrink:0">
            <i data-lucide="refresh-cw" style="width:12px;height:12px"></i>
          </button>
        </div>
        <div id="db-table-list">
          <div class="dbt-loading" style="padding:16px">Lade Datenbanken…</div>
        </div>
      </div>

      <!-- ── Center: Table View ── -->
      <div id="db-main">

        <div id="db-welcome">
          <i data-lucide="layers" style="width:44px;height:44px;opacity:.15"></i>
          <div style="font-family:'Space Mono',monospace;font-size:12px;color:var(--text3)">Tabelle aus der Seitenleiste wählen</div>
          <div class="db-welcome-grid" id="db-welcome-dbs"></div>
        </div>

        <div id="db-toolbar" style="display:none">
          <div class="db-source-badge" id="db-source-badge"></div>
          <i data-lucide="table-2" style="width:14px;height:14px;color:var(--accent2)"></i>
          <span id="db-table-label" style="font-size:13px;font-weight:800;font-family:'Space Mono',monospace;color:var(--text1)"></span>
          <span id="db-row-count"   style="font-size:11px;color:var(--text3);font-family:'Space Mono',monospace"></span>
          <div style="width:1px;height:20px;background:var(--border);margin:0 4px"></div>
          <input type="text" id="db-search" placeholder="Suchen…" oninput="onSearch()" style="width:160px">
          <select id="db-filter-col" onchange="onFilterChange()" style="width:120px">
            <option value="">Alle Spalten</option>
          </select>
          <input type="text" id="db-filter-val" placeholder="Filterwert…" oninput="loadTable()" style="width:120px">
          <div style="flex:1"></div>
          <button class="btn btn-ghost btn-sm" onclick="toggleSchema()">
            <i data-lucide="columns" style="width:12px;height:12px"></i> Schema
          </button>
          <button class="btn btn-add-row btn-sm" id="btn-add-row" onclick="openAddModal()">
            <i data-lucide="plus" style="width:12px;height:12px"></i> Zeile
          </button>
          <button class="btn btn-ghost btn-sm" onclick="loadTable()">
            <i data-lucide="refresh-cw" style="width:12px;height:12px"></i>
          </button>
        </div>

        <div class="db-table-wrap" id="db-table-wrap" style="display:none">
          <div class="db-empty" id="db-table-loading">
            <i data-lucide="loader-2" style="width:28px;height:28px;opacity:.3"></i>
            <span>Lade Daten…</span>
          </div>
          <table class="db-tbl" id="db-tbl" style="display:none">
            <thead id="db-thead"></thead>
            <tbody id="db-tbody"></tbody>
          </table>
        </div>

        <div id="db-pagination" style="display:none">
          <button class="pg-btn" id="pg-prev" onclick="changePage(-1)">◀ Zurück</button>
          <span id="pg-info"></span>
          <button class="pg-btn" id="pg-next" onclick="changePage(1)">Weiter ▶</button>
          <div style="flex:1"></div>
          <select id="pg-limit" onchange="onLimitChange()" style="padding:4px 8px;font-size:10px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-family:'Space Mono',monospace">
            <option value="50">50 / Seite</option>
            <option value="100" selected>100 / Seite</option>
            <option value="250">250 / Seite</option>
          </select>
        </div>

      </div>

      <!-- ── Right: Schema Panel ── -->
      <div id="db-schema-panel">
        <div class="schema-head">
          <span>Schema</span>
          <button class="db-act-btn" onclick="toggleSchema()"><i data-lucide="x" style="width:12px;height:12px"></i></button>
        </div>
        <div class="schema-list" id="schema-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- ── Row Detail Modal ── -->
<div class="db-overlay" id="detail-overlay">
  <div class="db-modal">
    <div class="db-modal-head">
      <div class="db-modal-title" id="detail-modal-title">Zeile Details</div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" id="detail-edit-btn" onclick="switchToEdit()">
          <i data-lucide="pencil" style="width:11px;height:11px"></i> Bearbeiten
        </button>
        <button class="db-act-btn" onclick="closeDetailModal()"><i data-lucide="x" style="width:13px;height:13px"></i></button>
      </div>
    </div>
    <div class="db-modal-body" id="detail-modal-body"></div>
    <div class="db-modal-foot">
      <button class="btn btn-danger btn-sm" onclick="deleteFromDetail()">
        <i data-lucide="trash-2" style="width:11px;height:11px"></i> Löschen
      </button>
      <button class="btn btn-ghost" onclick="closeDetailModal()">Schließen</button>
    </div>
  </div>
</div>

<!-- ── Edit / Add Modal ── -->
<div class="db-overlay" id="edit-overlay">
  <div class="db-modal">
    <div class="db-modal-head">
      <div class="db-modal-title" id="edit-modal-title">Zeile bearbeiten</div>
      <button class="db-act-btn" onclick="closeEditModal()"><i data-lucide="x" style="width:13px;height:13px"></i></button>
    </div>
    <div class="db-modal-body">
      <div class="db-field-grid" id="edit-field-grid"></div>
    </div>
    <div class="db-modal-foot">
      <button class="btn btn-ghost" onclick="closeEditModal()">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveRow()">
        <i data-lucide="save" style="width:12px;height:12px"></i> Speichern
      </button>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="db-toast"></div>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/layout.js"></script>
<script>
// ════════════════════════════════════════════════════════════════════
// DATABASE REGISTRY
// ════════════════════════════════════════════════════════════════════
const DATABASES = [
  {
    id: 'webcontrol', label: 'WebControl HQ', shortLabel: 'D1',
    type: 'd1', color: '#6366f1', icon: 'database',
    apiPrefix: '/api/db',
    description: 'Cloudflare D1 · webcontrol-hq'
  },
  {
    id: 'ratelimit', label: 'RateLimit DB', shortLabel: 'D1',
    type: 'd1', color: '#f59e0b', icon: 'shield',
    apiPrefix: '/api/rldb',
    description: 'Cloudflare D1 · ratelimit-db'
  },
  {
    id: 'rsdb', label: 'Rechtschreibe API', shortLabel: 'D1',
    type: 'd1', color: '#ec4899', icon: 'spell-check',
    apiPrefix: '/api/rsdb',
    description: 'Cloudflare D1 · rechtschreibe-api-db'
  },
  {
    id: 'frametrain', label: 'FrameTrain', shortLabel: 'PG',
    type: 'supabase', color: '#10b981', icon: 'train-front',
    apiPrefix: '/api/supabase/frametrain',
    description: 'Supabase PostgreSQL · FrameTrain'
  },
  {
    id: 'framesphere', label: 'FrameSphere', shortLabel: 'PG',
    type: 'supabase', color: '#06b6d4', icon: 'globe-2',
    apiPrefix: '/api/supabase/framesphere',
    description: 'Supabase PostgreSQL · FrameSphere'
  },
];

// Icon hints per table name (applies across all DBs)
const TABLE_ICONS = {
  todo_tasks:'check-square-2', todo_prompts:'message-square',
  notifications:'bell', support_tickets:'ticket', support_messages:'message-circle',
  error_logs:'alert-triangle', suggestions:'lightbulb', changelog_entries:'list-checks',
  blog_posts:'book-open', analytics_events:'bar-chart-2', daily_words:'pen-line',
  contact_messages:'mail', word_requests:'type', sites:'globe',
  vault_entries:'lock', pinboard_boards:'layout-grid', pinboard_pins:'pin',
  request_logs:'shield-alert', rate_limits:'gauge', api_keys:'key',
  corrections:'spell-check', requests:'file-text', users:'users',
  api_usage:'activity', sessions:'clock',
};

// ════════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════════
let dbMeta = {};          // { dbId: [{name, count, columns}] }
let currentDbId   = null;
let currentTable  = null;
let currentSchema = [];
let currentRows   = [];
let currentTotal  = 0;
let currentOffset = 0;
let currentLimit  = 100;
let currentOrderBy  = 'id';
let currentOrderDir = 'desc';
let editingRowId  = null;
let detailRowId   = null;
let sbConfigDbId  = null;
let schemaOpen    = false;
let searchTimeout = null;

// ════════════════════════════════════════════════════════════════════
// LOAD ALL DATABASES
// ════════════════════════════════════════════════════════════════════
async function initAll() {
  renderWelcomeBadges();
  renderSidebar(); // show skeleton
  await Promise.all(DATABASES.map(db => loadDbMeta(db)));
  renderSidebar();
}

async function loadDbMeta(db) {
  try {
    if (db.type === 'd1') {
      const data = await api(`${db.apiPrefix}/tables`);
      dbMeta[db.id] = data || [];
    } else if (db.type === 'supabase') {
      // Proxy through worker — no client-side key needed
      const data = await api(`${db.apiPrefix}/tables`);
      if (!data) { dbMeta[db.id] = { error: 'Worker-Proxy nicht erreichbar oder Secret nicht gesetzt' }; return; }
      if (data.error) { dbMeta[db.id] = { error: data.error }; return; }
      dbMeta[db.id] = data;
    }
  } catch(e) {
    dbMeta[db.id] = { error: e.message };
  }
}

async function refreshAll() {
  dbMeta = {};
  renderSidebar();
  await Promise.all(DATABASES.map(db => loadDbMeta(db)));
  renderSidebar();
  showToast('Alle Datenbanken aktualisiert', 'ok');
}

// ════════════════════════════════════════════════════════════════════
// SIDEBAR RENDER
// ════════════════════════════════════════════════════════════════════
const dbGroupOpen = {};

function renderSidebar() {
  const q = document.getElementById('db-sidebar-search').value.toLowerCase();
  const list = document.getElementById('db-table-list');
  list.innerHTML = DATABASES.map(db => renderDbGroup(db, q)).join('');
  refreshIcons();
}

function renderDbGroup(db, q) {
  const isOpen = dbGroupOpen[db.id] !== false; // default open
  const meta   = dbMeta[db.id];
  let tablesHtml = '';

  if (meta === undefined) {
    // Still loading
    tablesHtml = `<div class="dbt-loading">Lade…</div>`;
  } else if (meta === null) {
    tablesHtml = `<div class="db-group-error"><i data-lucide="alert-circle" style="width:11px;height:11px"></i> Nicht konfiguriert</div>`;
  } else if (meta.error) {
    // Show error — for Supabase hint to set wrangler secret
    const hint = db.type === 'supabase'
      ? `<div style="font-size:9px;color:var(--text3);padding:4px 8px 2px;font-family:'Space Mono',monospace;line-height:1.6">→ <code style="color:var(--accent2)">npx wrangler secret put ${db.id === 'frametrain' ? 'SUPABASE_FT_KEY' : 'SUPABASE_FS_KEY'}</code></div>`
      : '';
    tablesHtml = `<div class="db-group-error">
      <i data-lucide="alert-circle" style="width:11px;height:11px"></i>
      <span style="flex:1;word-break:break-word">${esc(meta.error)}</span>
    </div>${hint}`;
  } else {
    const filtered = q
      ? meta.filter(t => t.name.toLowerCase().includes(q))
      : meta;
    if (!filtered.length) {
      tablesHtml = `<div class="dbt-loading">${q ? 'Keine Treffer' : 'Keine Tabellen'}</div>`;
    } else {
      tablesHtml = filtered.map(t => {
        const icon    = TABLE_ICONS[t.name] || 'table-2';
        const active  = (currentDbId === db.id && currentTable === t.name) ? ' active' : '';
        return `<div class="db-table-item${active}" onclick="selectTable('${db.id}','${t.name}')">
          <i data-lucide="${icon}" style="width:13px;height:13px;color:${db.color};flex-shrink:0"></i>
          <span class="dbt-name">${esc(t.name)}</span>
          <span class="dbt-count">${t.count}</span>
        </div>`;
      }).join('');
      // Supabase tables are loaded via Worker proxy — no config button needed
    }
  }

  return `<div class="db-group" id="db-group-${db.id}">
    <div class="db-group-header" onclick="toggleGroup('${db.id}')">
      <div class="db-group-dot" style="background:${db.color}"></div>
      <span class="db-group-label">${esc(db.label)}</span>
      <span class="db-group-type">${db.shortLabel}</span>
      <span class="db-group-chevron${isOpen?' open':''}">▶</span>
    </div>
    <div class="db-group-tables${isOpen?' open':''}">
      ${tablesHtml}
    </div>
  </div>`;
}

function toggleGroup(dbId) {
  dbGroupOpen[dbId] = !(dbGroupOpen[dbId] !== false);
  const tablesEl   = document.querySelector(`#db-group-${dbId} .db-group-tables`);
  const chevronEl  = document.querySelector(`#db-group-${dbId} .db-group-chevron`);
  if (tablesEl)  tablesEl.classList.toggle('open', dbGroupOpen[dbId]);
  if (chevronEl) chevronEl.classList.toggle('open', dbGroupOpen[dbId]);
}

function filterSidebar() { renderSidebar(); }

function renderWelcomeBadges() {
  document.getElementById('db-welcome-dbs').innerHTML = DATABASES.map(db =>
    `<div class="db-welcome-db">
      <div class="db-welcome-dot" style="background:${db.color}"></div>
      ${esc(db.label)}
    </div>`
  ).join('');
  refreshIcons();
}

// ════════════════════════════════════════════════════════════════════
// SELECT TABLE
// ════════════════════════════════════════════════════════════════════
async function selectTable(dbId, tableName) {
  currentDbId    = dbId;
  currentTable   = tableName;
  currentOffset  = 0;
  currentOrderBy = 'id';
  currentOrderDir = 'desc';
  document.getElementById('db-search').value     = '';
  document.getElementById('db-filter-val').value = '';
  document.getElementById('db-filter-col').value = '';

  const db = DATABASES.find(d => d.id === dbId);

  // Source badge
  const badge = document.getElementById('db-source-badge');
  badge.textContent  = db.label;
  badge.style.background = db.color + '22';
  badge.style.color  = db.color;
  badge.style.border = `1px solid ${db.color}55`;

  // CRUD available?
  document.getElementById('btn-add-row').style.display = 'flex';

  document.getElementById('db-welcome').style.display = 'none';
  document.getElementById('db-toolbar').style.display = 'flex';
  document.getElementById('db-table-wrap').style.display = 'flex';
  document.getElementById('db-pagination').style.display = 'flex';
  document.getElementById('db-table-label').textContent = tableName;

  renderSidebar();
  await loadTable();
}

// ════════════════════════════════════════════════════════════════════
// LOAD TABLE DATA
// ════════════════════════════════════════════════════════════════════
async function loadTable() {
  if (!currentTable || !currentDbId) return;
  document.getElementById('db-tbl').style.display = 'none';
  document.getElementById('db-table-loading').style.display = 'flex';

  const db = DATABASES.find(d => d.id === currentDbId);
  try {
    if (db.type === 'd1') {
      await loadD1Table(db);
    } else if (db.type === 'supabase') {
      await loadSupabaseTable(db);
    }
  } catch(e) {
    document.getElementById('db-table-loading').innerHTML =
      `<div style="color:var(--red);font-size:12px;font-family:Space Mono,monospace">Fehler: ${esc(e.message)}</div>`;
  }
}

async function loadD1Table(db) {
  const search    = document.getElementById('db-search').value.trim();
  const filterCol = document.getElementById('db-filter-col').value;
  const filterVal = document.getElementById('db-filter-val').value.trim();

  const params = new URLSearchParams({
    limit: currentLimit, offset: currentOffset,
    order_by: currentOrderBy, order_dir: currentOrderDir,
  });
  if (search)                params.set('search', search);
  if (filterCol && filterVal){ params.set('filter_col', filterCol); params.set('filter_val', filterVal); }

  const data = await api(`${db.apiPrefix}/${currentTable}?${params}`);
  if (!data) {
    document.getElementById('db-table-loading').innerHTML = '<div style="color:var(--red);font-size:12px;font-family:Space Mono,monospace">API Fehler</div>';
    return;
  }
  currentSchema = (data.columns || []).map(c => ({
    name: c.name, type: c.type, pk: c.pk, notnull: c.notnull
  }));
  currentRows  = data.rows;
  currentTotal = data.total;
  finalizeTableRender();
}

async function loadSupabaseTable(db) {
  // All Supabase calls go through the Worker proxy — same as D1
  await loadD1Table(db);
}

function finalizeTableRender() {
  renderTableHeaders();
  renderTableBody();
  renderPagination();
  renderSchemaPanel();
  populateFilterCols();
  document.getElementById('db-row-count').textContent = `${currentTotal.toLocaleString('de')} Zeilen`;
  document.getElementById('db-table-loading').style.display = 'none';
  document.getElementById('db-tbl').style.display = 'table';
}

// ════════════════════════════════════════════════════════════════════
// TABLE RENDERING
// ════════════════════════════════════════════════════════════════════
const MAX_COLS = 12;

function renderTableHeaders() {
  const cols = currentSchema.slice(0, MAX_COLS);
  document.getElementById('db-thead').innerHTML = `<tr>
    ${cols.map(c => {
      const sorted = c.name === currentOrderBy;
      const arrow  = sorted ? (currentOrderDir === 'asc' ? '↑' : '↓') : '';
      return `<th class="${sorted?'sorted':''}" onclick="sortBy('${c.name}')">
        ${esc(c.name)}${arrow?`<span class="sort-arrow">${arrow}</span>`:''}
      </th>`;
    }).join('')}
    <th style="width:70px"></th>
  </tr>`;
}

function renderTableBody() {
  if (!currentRows.length) {
    document.getElementById('db-tbody').innerHTML =
      `<tr><td colspan="${currentSchema.length+1}" style="text-align:center;padding:32px;color:var(--text3);font-family:Space Mono,monospace;font-size:11px">Keine Einträge</td></tr>`;
    return;
  }
  const cols = currentSchema.slice(0, MAX_COLS).map(c => c.name);
  const rowKey = currentSchema.find(c => c.pk)?.name || 'id';
  document.getElementById('db-tbody').innerHTML = currentRows.map(row => {
    const rid = row[rowKey];
    return `<tr>
      ${cols.map(col => `<td>${renderCell(col, row[col], row, rowKey)}</td>`).join('')}
      <td>
        <div class="db-row-actions">
          <button class="db-act-btn" onclick="openDetailModal(${JSON.stringify(rid)})" title="Details">
            <i data-lucide="eye" style="width:12px;height:12px"></i>
          </button>
          <button class="db-act-btn" onclick="openEditModal(${JSON.stringify(rid)})" title="Bearbeiten">
            <i data-lucide="pencil" style="width:12px;height:12px"></i>
          </button>
          <button class="db-act-btn del" onclick="deleteRow(${JSON.stringify(rid)})" title="Löschen">
            <i data-lucide="trash-2" style="width:12px;height:12px"></i>
          </button>
        </div>
      </td>
    </tr>`;
  }).join('');
  refreshIcons();
}

function renderCell(col, val, row, rowKey) {
  if (val === null || val === undefined) return `<span class="db-cell-null">null</span>`;
  const str = String(val);
  const boolCols = ['done','read','published','important','resolved','used','archived','blocked'];
  if (boolCols.includes(col)) {
    return val == 1 || val === true
      ? `<span class="db-cell-bool-1">✓ Ja</span>`
      : `<span class="db-cell-bool-0">– Nein</span>`;
  }
  if (col.includes('_at') || col === 'date' || col === 'timestamp' || col === 'created_at' || col === 'updated_at') {
    return `<span class="db-cell-val" style="color:var(--text3)">${fmtDate(val)}</span>`;
  }
  if (str.length > 60) {
    const rid = row[rowKey];
    return `<span class="db-cell-val long" onclick="openDetailModal(${JSON.stringify(rid)})" title="Klicken für Details">${esc(str.slice(0,55))}…</span>`;
  }
  return `<span class="db-cell-val">${esc(str)}</span>`;
}

// ════════════════════════════════════════════════════════════════════
// SORT / PAGINATE / FILTER
// ════════════════════════════════════════════════════════════════════
function sortBy(col) {
  if (currentOrderBy === col) currentOrderDir = currentOrderDir === 'asc' ? 'desc' : 'asc';
  else { currentOrderBy = col; currentOrderDir = 'desc'; }
  currentOffset = 0;
  loadTable();
}

function renderPagination() {
  const pages   = Math.ceil(currentTotal / currentLimit) || 1;
  const curPage = Math.floor(currentOffset / currentLimit) + 1;
  document.getElementById('pg-info').textContent = `Seite ${curPage} / ${pages} (${currentTotal.toLocaleString('de')} gesamt)`;
  document.getElementById('pg-prev').disabled = currentOffset === 0;
  document.getElementById('pg-next').disabled = currentOffset + currentLimit >= currentTotal;
}

function changePage(dir) {
  currentOffset = Math.max(0, currentOffset + dir * currentLimit);
  loadTable();
}

function onLimitChange() {
  currentLimit  = parseInt(document.getElementById('pg-limit').value);
  currentOffset = 0;
  loadTable();
}

function onSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => { currentOffset = 0; loadTable(); }, 350);
}

function onFilterChange() {
  document.getElementById('db-filter-val').value = '';
  currentOffset = 0;
  loadTable();
}

function populateFilterCols() {
  const sel = document.getElementById('db-filter-col');
  sel.innerHTML = '<option value="">Alle Spalten</option>' +
    currentSchema.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
}

// ════════════════════════════════════════════════════════════════════
// SCHEMA PANEL
// ════════════════════════════════════════════════════════════════════
function toggleSchema() {
  schemaOpen = !schemaOpen;
  document.getElementById('db-schema-panel').classList.toggle('open', schemaOpen);
}

function renderSchemaPanel() {
  document.getElementById('schema-list').innerHTML = currentSchema.length
    ? currentSchema.map(c => `
        <div class="schema-col">
          <span class="schema-col-name">${esc(c.name)}</span>
          <span class="schema-col-type">${c.type || 'ANY'}</span>
          ${c.pk    ? '<span class="schema-col-pk">PK</span>'       : ''}
          ${c.notnull && !c.pk ? '<span class="schema-col-nn">NN</span>' : ''}
        </div>`).join('')
    : '<div style="color:var(--text3);font-size:11px;padding:8px 0">Kein Schema verfügbar</div>';
}

// ════════════════════════════════════════════════════════════════════
// DETAIL MODAL
// ════════════════════════════════════════════════════════════════════
function getPkCol() { return currentSchema.find(c => c.pk)?.name || 'id'; }
function getRowByPk(id) { return currentRows.find(r => String(r[getPkCol()]) === String(id)); }

function openDetailModal(id) {
  const row = getRowByPk(id);
  if (!row) return;
  detailRowId = id;
  document.getElementById('detail-modal-title').textContent = `${currentTable} #${id}`;
  document.getElementById('detail-modal-body').innerHTML = Object.entries(row).map(([k,v]) => `
    <div class="db-detail-row">
      <div class="db-detail-key">${esc(k)}</div>
      <div class="db-detail-val">${v===null||v===undefined ? '<span style="color:var(--text3);font-style:italic">null</span>' : esc(String(v))}</div>
    </div>`).join('');
  document.getElementById('detail-overlay').classList.add('open');
  refreshIcons();
}

function closeDetailModal() {
  document.getElementById('detail-overlay').classList.remove('open');
  detailRowId = null;
}

function switchToEdit() { closeDetailModal(); openEditModal(detailRowId); }

async function deleteFromDetail() {
  const id = detailRowId;
  closeDetailModal();
  await deleteRow(id);
}

// ════════════════════════════════════════════════════════════════════
// EDIT / ADD MODAL
// ════════════════════════════════════════════════════════════════════
function openEditModal(id) {
  const row = id !== null ? getRowByPk(id) : null;
  editingRowId = id ?? null;
  document.getElementById('edit-modal-title').textContent = id !== null
    ? `${currentTable} #${id} bearbeiten`
    : `Neue Zeile in ${currentTable}`;
  renderEditFields(row);
  document.getElementById('edit-overlay').classList.add('open');
  refreshIcons();
}

function openAddModal() { openEditModal(null); }
function closeEditModal() { document.getElementById('edit-overlay').classList.remove('open'); editingRowId = null; }

function renderEditFields(row) {
  const grid = document.getElementById('edit-field-grid');
  if (!currentSchema.length && row) {
    // Build from row
    currentSchema = Object.keys(row).map(k => ({ name: k, type: 'any', pk: k === 'id', notnull: false }));
  }
  grid.innerHTML = currentSchema.map(col => {
    const val    = row ? (row[col.name] ?? '') : '';
    const isLong = ['content','message','prompt','description','stack','notes','steps','excerpt','body','text'].some(k => col.name.includes(k));
    const isPK   = !!col.pk;
    return `<div class="db-field-group${isLong?' full':''}">
      <label>
        ${esc(col.name)}
        ${isPK ? '<span class="pk-badge">PK</span>' : ''}
        <span style="color:var(--text3);font-size:8px;margin-left:auto">${col.type||''}</span>
      </label>
      ${isLong
        ? `<textarea name="${col.name}" ${isPK?'readonly':''} rows="4">${esc(String(val))}</textarea>`
        : `<input  name="${col.name}" ${isPK?'readonly':''} value="${esc(String(val===null?'':val))}">`
      }
    </div>`;
  }).join('');
}

async function saveRow() {
  const fields = document.querySelectorAll('#edit-field-grid [name]');
  const body   = {};
  fields.forEach(el => { if (!el.readOnly) body[el.name] = el.value; });

  const db = DATABASES.find(d => d.id === currentDbId);
  let ok = false;

  // Both D1 and Supabase use the same Worker-proxy pattern
  let res;
  if (editingRowId !== null) {
    res = await api(`${db.apiPrefix}/${currentTable}/${editingRowId}`, { method:'PATCH', body });
  } else {
    res = await api(`${db.apiPrefix}/${currentTable}`, { method:'POST', body });
  }
  ok = res?.success;

  if (ok) {
    showToast(editingRowId!==null ? 'Zeile aktualisiert' : 'Zeile hinzugefügt', 'ok');
    closeEditModal();
    await loadTable();
    await loadDbMeta(db);
    renderSidebar();
  } else {
    showToast('Fehler beim Speichern', 'err');
  }
}

// ════════════════════════════════════════════════════════════════════
// DELETE
// ════════════════════════════════════════════════════════════════════
async function deleteRow(id) {
  if (!confirm(`Zeile #${id} aus "${currentTable}" wirklich löschen?`)) return;
  const db = DATABASES.find(d => d.id === currentDbId);
  let ok = false;

  // Both D1 and Supabase go through Worker proxy
  const res = await api(`${db.apiPrefix}/${currentTable}/${id}`, { method:'DELETE' });
  ok = res?.success;

  if (ok) {
    showToast('Zeile gelöscht', 'ok');
    await loadTable();
    await loadDbMeta(db);
    renderSidebar();
  } else {
    showToast('Fehler beim Löschen', 'err');
  }
}

// ════════════════════════════════════════════════════════════════════
// SUPABASE CONFIG
// ════════════════════════════════════════════════════════════════════
function openSbConfig(dbId) {
  sbConfigDbId = dbId;
  const db    = DATABASES.find(d => d.id === dbId);
  const key   = localStorage.getItem(db.lsKey) || '';
  document.getElementById('sb-config-title').textContent = `${db.label} – API Key`;
  document.getElementById('sb-key-input').value  = key;
  document.getElementById('sb-key-preview').textContent = key ? `Gespeicherter Key: ${key.slice(0,20)}…` : 'Kein Key gespeichert';
  document.getElementById('sb-config-overlay').classList.add('open');
  refreshIcons();
}

function closeSbConfig() {
  document.getElementById('sb-config-overlay').classList.remove('open');
  sbConfigDbId = null;
}

async function saveSbKey() {
  const key = document.getElementById('sb-key-input').value.trim();
  if (!key) { showToast('Kein Key eingegeben', 'err'); return; }
  const db = DATABASES.find(d => d.id === sbConfigDbId);
  localStorage.setItem(db.lsKey, key);
  closeSbConfig();
  showToast(`${db.label} verbinden…`, 'ok');
  dbMeta[db.id] = undefined;
  renderSidebar();
  await loadDbMeta(db);
  renderSidebar();
}

function clearSbKey() {
  const db = DATABASES.find(d => d.id === sbConfigDbId);
  if (!db) return;
  localStorage.removeItem(db.lsKey);
  dbMeta[db.id] = null;
  closeSbConfig();
  renderSidebar();
  showToast('Key gelöscht', 'ok');
}

// ════════════════════════════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════════════════════════════
let toastTimer;
function showToast(msg, type='ok') {
  const el = document.getElementById('db-toast');
  el.textContent = (type==='ok' ? '✓ ' : '✗ ') + msg;
  el.className   = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ════════════════════════════════════════════════════════════════════
// BACKDROP CLOSE
// ════════════════════════════════════════════════════════════════════
['detail-overlay','edit-overlay'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// ════════════════════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════════════════════
injectLoginScreen();
checkAuth(() => {
  initLayout(null);
  initAll();
});
window.initAfterLogin = () => {
  initLayout(null);
  initAll();
};
</script>
