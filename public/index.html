<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebControl HQ – Dashboard</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

<!-- Layout shell (topbar + sidebar injected by layout.js) -->
<div id="layout">
  <!-- sidebar injected here -->
  <div id="main">

    <div class="page-header">
      <div class="page-title">Dashboard</div>
      <div class="page-sub">Alle Projekte auf einen Blick</div>
    </div>

    <div class="scroll-area" style="flex:1;overflow-y:auto;padding:24px 28px" id="overview-body">
      <div class="loading">Lade Daten…</div>
    </div>

  </div>
</div>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/layout.js"></script>

<script>
// ── Overview Loader ───────────────────────────────────────────────
async function loadOverview() {
  const body = document.getElementById('overview-body');
  const data = await api('/api/overview');

  if (!data) {
    body.innerHTML = `
      <div style="background:var(--surface);border:1px solid rgba(245,158,11,0.3);border-radius:12px;padding:24px;max-width:600px">
        <div style="font-size:16px;font-weight:800;margin-bottom:8px;color:var(--yellow)">⚠ API nicht verbunden</div>
        <div style="font-size:13px;color:var(--text2);line-height:1.6">
          Worker noch nicht deployed oder API_URL falsch.<br>
          <span class="mono">→ Siehe README.md für Setup-Anleitung</span>
        </div>
        <div class="sites-grid" style="margin-top:16px">
          ${SITES.map(s => sitCard(s, {})).join('')}
        </div>
      </div>`;
    return;
  }

  const totalErrors  = data.sites.reduce((a, s) => a + s.unresolved_errors,    0);
  const totalTickets = data.sites.reduce((a, s) => a + s.open_tickets,          0);
  const totalUnread  = data.sites.reduce((a, s) => a + s.unread_notifications,  0);

  body.innerHTML = `
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Webseiten</div>
        <div class="stat-val green">10</div>
        <div class="stat-sub">Alle aktiv</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Offene Tickets</div>
        <div class="stat-val yellow">${totalTickets}</div>
        <div class="stat-sub">Gesamt offen</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Fehler</div>
        <div class="stat-val red">${totalErrors}</div>
        <div class="stat-sub">Ungelöst</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Benachrichtigungen</div>
        <div class="stat-val blue">${totalUnread}</div>
        <div class="stat-sub">Ungelesen</div>
      </div>
    </div>

    <div class="sidebar-label" style="margin-bottom:12px">Alle Webseiten</div>
    <div class="sites-grid">
      ${SITES.map(s => {
        const sd = data.sites.find(x => x.id === s.id) || {};
        return sitCard(s, sd);
      }).join('')}
    </div>

    ${data.recent_notifications?.length ? `
      <div class="mt-16">
        <div class="sidebar-label" style="margin-bottom:12px">Letzte Aktivitäten</div><!-- refreshIcons below -->
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden">
          ${data.recent_notifications.slice(0, 12).map(n => `
            <div style="display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border)">
              <div class="notif-type-dot ${n.type}"></div>
              <div style="flex:1">
                <span style="font-size:12px;font-weight:700">${esc(n.title)}</span>
                ${n.message ? `<span style="font-size:11px;color:var(--text3);margin-left:8px">${esc(n.message).slice(0, 50)}</span>` : ''}
              </div>
              <span class="mono" style="color:var(--text3)">${getSiteById(n.site_id)?.name || n.site_id}</span>
              <span class="mono" style="color:var(--text3)">${fmtDate(n.created_at)}</span>
            </div>`).join('')}
        </div>
      </div>` : ''}
  `;
  refreshIcons();
}

function sitCard(s, sd) {
  const chips = [];
  if (sd.unresolved_errors    > 0) chips.push(`<span class="chip error"><i data-lucide="alert-triangle" style="width:9px;height:9px"></i> ${sd.unresolved_errors} Fehler</span>`);
  if (sd.open_tickets         > 0) chips.push(`<span class="chip warn"><i data-lucide="ticket" style="width:9px;height:9px"></i> ${sd.open_tickets} Tickets</span>`);
  if (sd.unread_notifications > 0) chips.push(`<span class="chip info"><i data-lucide="bell" style="width:9px;height:9px"></i> ${sd.unread_notifications} Neu</span>`);
  if (!chips.length)               chips.push(`<span class="chip ok"><i data-lucide="check" style="width:9px;height:9px"></i> Alles OK</span>`);
  return `
    <a class="site-card" href="${siteHref(s.id)}">
      <div class="site-card-top">
        <div class="site-icon" style="background:${s.color}22;border:1px solid ${s.color}44">${siteIcon(s, 16)}</div>
        <div>
          <div class="site-name">${s.name}</div>
          <div class="site-url">${s.url.replace('https://','')}</div>
        </div>
      </div>
      <div class="site-chips">${chips.join('')}</div>
    </a>`;
}

// ── Boot ──────────────────────────────────────────────────────────
injectLoginScreen();
checkAuth(() => {
  initLayout(null);
  loadOverview();
});

window.initAfterLogin = () => {
  initLayout(null);
  loadOverview();
};
</script>
</body>
</html>
