<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebControl HQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080a0f;
  --bg2: #0d1018;
  --bg3: #131720;
  --surface: #161c28;
  --surface2: #1e2636;
  --border: #232e42;
  --border2: #2d3d58;
  --text: #e8edf5;
  --text2: #8a96aa;
  --text3: #4a5568;
  --accent: #3b82f6;
  --accent2: #60a5fa;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #f59e0b;
  --purple: #a855f7;
  --cyan: #06b6d4;
  --sidebar-w: 220px;
  --topbar-h: 56px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Topbar ──────────────────────────────────────── */
#topbar {
  height: var(--topbar-h);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
  z-index: 100;
}

.logo {
  font-family: 'Space Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  color: var(--accent2);
  letter-spacing: 0.05em;
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo-dot {
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--accent);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(0.85); }
}

.topbar-spacer { flex: 1; }

.topbar-stat {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--text2);
  padding: 6px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.topbar-stat .num {
  color: var(--text);
  font-weight: 700;
}

#notif-btn {
  position: relative;
  width: 36px; height: 36px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: border-color 0.2s;
  font-size: 16px;
}

#notif-btn:hover { border-color: var(--accent); }

.notif-badge {
  position: absolute;
  top: -4px; right: -4px;
  background: var(--red);
  color: white;
  font-size: 9px;
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  width: 16px; height: 16px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid var(--bg2);
}

/* ── Layout ──────────────────────────────────────── */
#layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Sidebar ─────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  flex-shrink: 0;
}

.sidebar-section {
  padding: 16px 12px 8px;
}

.sidebar-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--text3);
  padding: 0 8px;
  margin-bottom: 4px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  border: 1px solid transparent;
  position: relative;
}

.nav-item:hover {
  background: var(--surface);
  color: var(--text);
}

.nav-item.active {
  background: var(--surface2);
  color: var(--accent2);
  border-color: var(--border2);
}

.nav-item .icon { font-size: 14px; width: 18px; text-align: center; }

.nav-badge {
  margin-left: auto;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  background: var(--red);
  color: white;
  padding: 1px 5px;
  border-radius: 10px;
  min-width: 18px;
  text-align: center;
}

.nav-badge.yellow { background: var(--yellow); color: #000; }
.nav-badge.blue { background: var(--accent); }

.site-color {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── Main ────────────────────────────────────────── */
#main {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Page: Overview ──────────────────────────────── */
.page { display: none; flex: 1; overflow-y: auto; }
.page.active { display: flex; flex-direction: column; }

.page-header {
  padding: 24px 28px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg2);
}

.page-title {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.page-sub {
  font-size: 12px;
  color: var(--text2);
  margin-top: 2px;
  font-family: 'Space Mono', monospace;
}

.page-body {
  padding: 24px 28px;
  flex: 1;
}

/* ── Cards & Grid ────────────────────────────────── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
  transition: border-color 0.2s;
}

.stat-card:hover { border-color: var(--border2); }

.stat-label {
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text2);
  margin-bottom: 8px;
}

.stat-val {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1;
}

.stat-val.red { color: var(--red); }
.stat-val.green { color: var(--green); }
.stat-val.blue { color: var(--accent2); }
.stat-val.yellow { color: var(--yellow); }

.stat-sub {
  font-size: 11px;
  color: var(--text3);
  margin-top: 4px;
  font-family: 'Space Mono', monospace;
}

/* ── Sites Grid ──────────────────────────────────── */
.sites-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}

.site-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.1s;
}

.site-card:hover {
  border-color: var(--border2);
  transform: translateY(-1px);
}

.site-card-top {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.site-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.site-name {
  font-size: 14px;
  font-weight: 700;
}

.site-url {
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  color: var(--text3);
}

.site-chips {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.chip {
  font-size: 9px;
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 2px 7px;
  border-radius: 20px;
  border: 1px solid;
}

.chip.error { color: var(--red); border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.07); }
.chip.warn { color: var(--yellow); border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.07); }
.chip.ok { color: var(--green); border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.07); }
.chip.info { color: var(--accent2); border-color: rgba(96,165,250,0.3); background: rgba(96,165,250,0.07); }
.chip.neutral { color: var(--text2); border-color: var(--border); background: var(--surface2); }

/* ── Site Page ───────────────────────────────────── */
.site-tabs {
  display: flex;
  gap: 2px;
  padding: 0 28px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
}

.tab-btn {
  padding: 12px 16px;
  font-size: 12px;
  font-weight: 700;
  font-family: 'Space Mono', monospace;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  background: none;
  border-left: none; border-right: none; border-top: none;
}

.tab-btn:hover { color: var(--text2); }
.tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent); }

.tab-panel { display: none; padding: 24px 28px; }
.tab-panel.active { display: block; }

/* ── Table ───────────────────────────────────────── */
.data-table {
  width: 100%;
  border-collapse: collapse;
}

.data-table th {
  text-align: left;
  font-size: 9px;
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text3);
  padding: 0 12px 10px;
  border-bottom: 1px solid var(--border);
}

.data-table td {
  padding: 10px 12px;
  font-size: 13px;
  border-bottom: 1px solid rgba(35,46,66,0.5);
  vertical-align: top;
}

.data-table tr:last-child td { border-bottom: none; }

.data-table tr:hover td { background: rgba(30,38,54,0.4); }

/* ── Status badges ───────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 20px;
  border: 1px solid;
}

.badge.open { color: var(--accent2); border-color: rgba(96,165,250,0.3); background: rgba(96,165,250,0.08); }
.badge.in_progress { color: var(--yellow); border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.08); }
.badge.resolved, .badge.done, .badge.published, .badge.approved { color: var(--green); border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.08); }
.badge.closed, .badge.rejected { color: var(--text3); border-color: var(--border); background: var(--surface2); }
.badge.draft, .badge.pending { color: var(--text2); border-color: var(--border); background: var(--surface2); }
.badge.urgent { color: var(--red); border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.08); }

/* ── Buttons ─────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  border-radius: 8px;
  cursor: pointer;
  border: 1px solid;
  transition: all 0.15s;
}

.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

.btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }

.btn-ghost {
  background: transparent;
  border-color: var(--border2);
  color: var(--text2);
}

.btn-ghost:hover { border-color: var(--accent); color: var(--accent2); }

.btn-danger {
  background: transparent;
  border-color: rgba(239,68,68,0.3);
  color: var(--red);
}

.btn-danger:hover { background: rgba(239,68,68,0.1); }

.btn-sm { padding: 4px 10px; font-size: 10px; }

/* ── Form ────────────────────────────────────────── */
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}

.form-full { grid-column: 1/-1; }

.form-group { display: flex; flex-direction: column; gap: 5px; }

label {
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text3);
}

input, textarea, select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 12px;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  transition: border-color 0.15s;
  outline: none;
}

input:focus, textarea:focus, select:focus { border-color: var(--accent); }

textarea { resize: vertical; min-height: 80px; }

.form-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
}

.form-card-title {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 16px;
  color: var(--text2);
  font-family: 'Space Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* ── Notifications Panel ─────────────────────────── */
#notif-panel {
  position: fixed;
  top: 56px; right: 0;
  width: 360px;
  height: calc(100vh - 56px);
  background: var(--bg2);
  border-left: 1px solid var(--border);
  z-index: 200;
  display: none;
  flex-direction: column;
  overflow: hidden;
}

#notif-panel.open { display: flex; }

.notif-panel-head {
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.notif-panel-head h3 {
  font-size: 13px;
  font-weight: 700;
  font-family: 'Space Mono', monospace;
}

.notif-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.notif-item {
  padding: 12px 14px;
  border-radius: 8px;
  border: 1px solid transparent;
  margin-bottom: 4px;
  cursor: pointer;
  transition: background 0.15s;
}

.notif-item:hover { background: var(--surface); border-color: var(--border); }
.notif-item.unread { border-color: rgba(59,130,246,0.2); background: rgba(59,130,246,0.04); }

.notif-item-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 3px;
}

.notif-type-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.notif-type-dot.error { background: var(--red); }
.notif-type-dot.warning { background: var(--yellow); }
.notif-type-dot.info { background: var(--accent); }
.notif-type-dot.success { background: var(--green); }

.notif-title { font-size: 12px; font-weight: 700; }
.notif-site {
  margin-left: auto;
  font-size: 9px;
  font-family: 'Space Mono', monospace;
  color: var(--text3);
}
.notif-msg { font-size: 11px; color: var(--text2); padding-left: 14px; }
.notif-time { font-size: 9px; font-family: 'Space Mono', monospace; color: var(--text3); padding-left: 14px; margin-top: 2px; }

/* ── Empty state ─────────────────────────────────── */
.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--text3);
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  gap: 8px;
}

.empty .emoji { font-size: 32px; }

/* ── Loading ─────────────────────────────────────── */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  color: var(--text3);
  font-family: 'Space Mono', monospace;
  font-size: 12px;
}

/* ── Actions bar ─────────────────────────────────── */
.actions-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.actions-bar .flex-1 { flex: 1; }

/* ── Analytics mini chart ────────────────────────── */
.analytics-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
}

.chart-title {
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text3);
  margin-bottom: 14px;
}

.bar-chart {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  height: 80px;
}

.bar-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }

.bar-fill {
  width: 100%;
  background: var(--accent);
  border-radius: 3px 3px 0 0;
  transition: height 0.4s;
  min-height: 2px;
  opacity: 0.7;
}

.bar-label { font-size: 8px; font-family: 'Space Mono', monospace; color: var(--text3); }

.scroll-area { overflow-y: auto; }

/* ── Ticket detail ───────────────────────────────── */
.ticket-detail {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
}

.ticket-meta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 12px;
  align-items: center;
}

.ticket-msg {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
  padding: 12px;
  background: var(--bg3);
  border-radius: 8px;
  margin-bottom: 12px;
  border-left: 3px solid var(--border2);
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* Transition */
.fade-in { animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

select option { background: var(--surface2); }

.text-muted { color: var(--text2); font-size: 12px; }
.mono { font-family: 'Space Mono', monospace; font-size: 11px; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.flex { display: flex; }
.items-center { align-items: center; }
.gap-8 { gap: 8px; }
.gap-12 { gap: 12px; }
</style>
</head>
<body>

<!-- Topbar -->
<div id="topbar">
  <div class="logo">
    <div class="logo-dot"></div>
    WEBCONTROL HQ
  </div>
  <div class="topbar-spacer"></div>
  <div class="topbar-stat">TICKETS <span class="num" id="stat-tickets">–</span></div>
  <div class="topbar-stat">ERRORS <span class="num" id="stat-errors" style="color:var(--red)">–</span></div>
  <div class="topbar-stat">SITES <span class="num" style="color:var(--green)">10</span></div>
  <div id="notif-btn" onclick="toggleNotif()">🔔<span class="notif-badge" id="notif-count" style="display:none">0</span></div>
</div>

<!-- Layout -->
<div id="layout">
  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Übersicht</div>
      <div class="nav-item active" onclick="showPage('overview')" id="nav-overview">
        <span class="icon">⚡</span> Dashboard
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Webseiten</div>
      <div id="site-nav"></div>
    </div>
  </nav>

  <!-- Main -->
  <div id="main">

    <!-- Overview Page -->
    <div class="page active fade-in" id="page-overview">
      <div class="page-header">
        <div class="page-title">Dashboard</div>
        <div class="page-sub">Alle Projekte auf einen Blick</div>
      </div>
      <div class="page-body scroll-area" id="overview-body">
        <div class="loading">Lade Daten…</div>
      </div>
    </div>

    <!-- Dynamic site pages injected here -->
    <div id="site-pages"></div>

  </div>
</div>

<!-- Notification Panel -->
<div id="notif-panel">
  <div class="notif-panel-head">
    <h3>🔔 Benachrichtigungen</h3>
    <button class="btn btn-ghost btn-sm" onclick="markAllRead()">Alle gelesen</button>
  </div>
  <div class="notif-list" id="notif-list">
    <div class="loading">Lade…</div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────
// Nach dem Deploy: API_URL auf deine Worker-URL setzen
const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:8787'
  : 'https://webcontrol-hq-api.karol-paschek.workers.dev';

// ── Sites Definition ──────────────────────────────────────────────
const SITES = [
  { id: 'framesphere',  name: 'Frame-Sphere',   url: 'https://frame-sphere.vercel.app', icon: '🔮', color: '#a855f7', tabs: ['support','blog','daten'] },
  { id: 'frametrain',   name: 'FrameTrain',      url: 'https://frame-train.vercel.app',  icon: '🚂', color: '#f59e0b', tabs: ['support','changelog','daten'] },

let currentPage = 'overview';

let overviewData = null;
let notifOpen = false;

// ── API helper ────────────────────────────────────────────────────
async function api(path, opts = {}) {
  try {
    const r = await fetch(API_URL + path, {
      headers: { 'Content-Type': 'application/json', ...opts.headers },
      ...opts,
      body: opts.body ? JSON.stringify(opts.body) : undefined,
    });
    return await r.json();
  } catch(e) {
    console.error('API error:', e);
    return null;
  }
}

// ── Build Sidebar ─────────────────────────────────────────────────
function buildSidebar() {
  const nav = document.getElementById('site-nav');
  nav.innerHTML = SITES.map(s => `
    <div class="nav-item" id="nav-${s.id}" onclick="showSite('${s.id}')">

// ── Build Site Pages ──────────────────────────────────────────────
function buildSitePages() {
  const container = document.getElementById('site-pages');
  container.innerHTML = SITES.map(s => `
    <div class="page fade-in" id="page-${s.id}">
      <div class="page-header" style="border-left: 3px solid ${s.color}; padding-left: 25px;">

          <div>

      <div class="site-tabs">
        ${s.tabs.map((t,i) => `<button class="tab-btn${i===0?' active':''}" onclick="showTab('${s.id}','${t}',this)" id="tab-${s.id}-${t}">${tabLabel(t)}</button>`).join('')}
        <button class="tab-btn" onclick="showTab('${s.id}','errors',this)" id="tab-${s.id}-errors">⚠ Errors</button>

      </div>
    </div>

}

function tabLabel(t) {
  const map = { support:'💬 Support', changelog:'📋 Changelog', blog:'📰 Blog', daten:'📊 Daten', wortanfragen:'📝 Wort-Anfragen', vorschläge:'💡 Vorschläge', analytics:'📈 Analytics', errors:'⚠ Errors', notifications:'🔔 Notifs' };
  return map[t] || t;
}

// ── Navigation ────────────────────────────────────────────────────
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + pageId)?.classList.add('active');
  document.getElementById('nav-' + pageId)?.classList.add('active');
  currentPage = pageId;
  if (pageId === 'overview') loadOverview();
}

function showSite(siteId) {
  currentSite = siteId;
  showPage(siteId);
  const site = SITES.find(s => s.id === siteId);
  if (!site) return;
  // Load first tab
  const firstTab = site.tabs[0];
  loadTab(siteId, firstTab);
  loadTab(siteId, 'errors');
  loadTab(siteId, 'notifications');
}

function showTab(siteId, tab, btn) {
  document.querySelectorAll(`#tabs-${siteId} .tab-panel`).forEach(p => p.classList.remove('active'));
  document.querySelectorAll(`#page-${siteId} .tab-btn`).forEach(b => b.classList.remove('active'));
  document.getElementById(`tabp-${siteId}-${tab}`)?.classList.add('active');
  if (btn) btn.classList.add('active');
  loadTab(siteId, tab);
}

// ── Load Tab Content ──────────────────────────────────────────────
async function loadTab(siteId, tab) {
  const panel = document.getElementById(`tabp-${siteId}-${tab}`);
  if (!panel) return;
  // Only reload if still loading placeholder
  if (!panel.innerHTML.includes('Lade') && panel.dataset.loaded) return;
  panel.dataset.loaded = '1';

  switch(tab) {
    case 'support': await loadSupport(siteId, panel); break;
    case 'changelog': await loadChangelog(siteId, panel); break;
    case 'blog': await loadBlog(siteId, panel); break;
    case 'wortanfragen': await loadWordRequests(panel); break;
    case 'vorschläge': await loadSuggestions(panel); break;
    case 'analytics': await loadAnalytics(siteId, panel); break;
    case 'daten': await loadDaten(siteId, panel); break;
    case 'errors': await loadErrors(siteId, panel); break;
    case 'notifications': await loadSiteNotifs(siteId, panel); break;
  }
}

  const data = await api(`/api/analytics?site_id=${siteId}&days=7`);
  if (!data) { panel.innerHTML = errMsg(); return; }

  const maxViews = Math.max(...by_day.map(d => d.views), 1);

  panel.innerHTML = `

      <div class="chart-card" style="grid-column:1/-1">

        <div class="bar-chart">
          ${by_day.map(d => `
            <div class="bar-col">
              <div class="bar-fill" style="height:${Math.round((d.views/maxViews)*70)+10}px;background:var(--accent)"></div>
              <div class="bar-label">${d.day.slice(5)}</div>
            </div>
          `).join('') || '<div style="color:var(--text3);font-size:12px;font-family:Space Mono">Noch keine Daten</div>'}
        </div>
      </div>
      ${by_type.map(t => `
        <div class="chart-card">
          <div class="chart-title">${t.event_type}</div>
          <div style="font-size:32px;font-weight:800;color:var(--accent2)">${t.count}</div>
        </div>
      `).join('') || `<div class="chart-card"><div class="chart-title">Kein Traffic</div><div style="font-size:24px;font-weight:800;color:var(--text3)">0</div></div>`}
    </div>
    <div class="mt-16" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px">
      <div class="form-card-title">Manueller Tracking-Snippet</div>
      <pre style="font-family:'Space Mono',monospace;font-size:11px;color:var(--text2);overflow-x:auto;white-space:pre-wrap">fetch('${API_URL}/api/analytics', {
  method: 'POST',
  headers: {'Content-Type':'application/json'},
  body: JSON.stringify({
    site_id: '${siteId}',
    event_type: 'pageview',
    path: window.location.pathname
  })
});</pre>
    </div>
  `;
}

// ── DATEN (Overview) ──────────────────────────────────────────────
async function loadDaten(siteId, panel) {
  const [tickets, errors, notifs] = await Promise.all([
    api(`/api/support?site_id=${siteId}`),
    api(`/api/errors?site_id=${siteId}`),
    api(`/api/notifications?site_id=${siteId}&limit=10`),
  ]);
  const site = SITES.find(s => s.id === siteId);
  panel.innerHTML = `
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Support Tickets</div>
        <div class="stat-val blue">${tickets?.length || 0}</div>
        <div class="stat-sub">Gesamt</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Offene Tickets</div>
        <div class="stat-val yellow">${tickets?.filter(t=>t.status==='open').length || 0}</div>
        <div class="stat-sub">Offen</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Fehler</div>
        <div class="stat-val red">${errors?.filter(e=>!e.resolved).length || 0}</div>
        <div class="stat-sub">Ungelöst</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Benachrichtigungen</div>
        <div class="stat-val">${notifs?.filter(n=>!n.read).length || 0}</div>
        <div class="stat-sub">Ungelesen</div>
      </div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;">
      <div class="form-card-title">Site Info</div>
      <table style="width:100%;border-collapse:collapse">
        <tr><td style="padding:8px 0;color:var(--text3);font-size:12px;font-family:'Space Mono',monospace;width:140px">ID</td><td class="mono">${siteId}</td></tr>
        <tr><td style="padding:8px 0;color:var(--text3);font-size:12px;font-family:'Space Mono',monospace">Name</td><td style="font-weight:700">${site?.name}</td></tr>
        <tr><td style="padding:8px 0;color:var(--text3);font-size:12px;font-family:'Space Mono',monospace">URL</td><td><a href="${site?.url}" target="_blank" style="color:var(--accent2)">${site?.url}</a></td></tr>
        <tr><td style="padding:8px 0;color:var(--text3);font-size:12px;font-family:'Space Mono',monospace">Features</td><td>${SITES.find(s=>s.id===siteId)?.tabs.map(t=>`<span class="chip neutral">${t}</span>`).join(' ')}</td></tr>
      </table>
    </div>
    <div style="margin-top:16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;">
      <div class="form-card-title">Notification senden</div>
      <div class="form-row">
        <div class="form-group"><label>Typ</label><select id="nd-type-${siteId}"><option value="info">Info</option><option value="warning">Warning</option><option value="error">Error</option><option value="success">Success</option></select></div>
        <div class="form-group"><label>Titel</label><input id="nd-title-${siteId}" placeholder="Titel…"></div>
      </div>
      <div class="form-row">
        <div class="form-group form-full"><label>Nachricht</label><input id="nd-msg-${siteId}" placeholder="Nachricht…"></div>
      </div>
      <button class="btn btn-primary" onclick="sendNotif('${siteId}')">Senden</button>
    </div>
  `;
}

async function sendNotif(siteId) {
  const data = {
    site_id: siteId,
    type: document.getElementById(`nd-type-${siteId}`)?.value,
    title: document.getElementById(`nd-title-${siteId}`)?.value,
    message: document.getElementById(`nd-msg-${siteId}`)?.value,
  };
  if (!data.title) { alert('Titel erforderlich'); return; }
  await api('/api/notifications', { method: 'POST', body: data });
  reloadTab(siteId, 'notifications');
  loadTopbarStats();
}

// ── ERRORS ────────────────────────────────────────────────────────
async function loadErrors(siteId, panel) {
  const errors = await api(`/api/errors?site_id=${siteId}`);
  if (!errors) { panel.innerHTML = errMsg(); return; }
  const unresolved = errors.filter(e => !e.resolved);
  panel.innerHTML = `
    <div class="actions-bar">
      <div style="font-size:13px;font-weight:700">Fehler <span style="color:var(--red)">${unresolved.length} ungelöst</span></div>
      <button class="btn btn-ghost btn-sm" onclick="reloadTab('${siteId}','errors')">↻ Aktualisieren</button>
    </div>
    ${errors.length ? `<table class="data-table">
      <thead><tr><th>Typ</th><th>Nachricht</th><th>Pfad</th><th>Status</th><th>Datum</th><th>Aktionen</th></tr></thead>
      <tbody>${errors.map(e => `
        <tr>
          <td class="mono" style="color:var(--red)">${esc(e.error_type)}</td>
          <td style="max-width:200px;font-size:12px">${esc(e.message)}</td>
          <td class="mono" style="color:var(--text3)">${esc(e.path||'–')}</td>
          <td><span class="badge ${e.resolved?'resolved':'open'}">${e.resolved?'resolved':'open'}</span></td>
          <td class="mono" style="color:var(--text3)">${fmtDate(e.created_at)}</td>
          <td>${!e.resolved ? `<button class="btn btn-ghost btn-sm" onclick="resolveError(${e.id},'${siteId}')">✓ Lösen</button>` : ''}</td>
        </tr>
      `).join('')}</tbody>
    </table>` : empty('Keine Fehler – alles grün ✓')}
  `;
}

async function resolveError(id, siteId) {
  await api(`/api/errors/${id}/resolve`, { method: 'PATCH' });
  reloadTab(siteId, 'errors');
}

// ── SITE NOTIFS ───────────────────────────────────────────────────
async function loadSiteNotifs(siteId, panel) {
  const notifs = await api(`/api/notifications?site_id=${siteId}`);
  if (!notifs) { panel.innerHTML = errMsg(); return; }
  panel.innerHTML = `
    <div class="actions-bar">
      <div style="font-size:13px;font-weight:700">Benachrichtigungen (${notifs.length})</div>
      <button class="btn btn-ghost btn-sm" onclick="markSiteRead('${siteId}')">Alle gelesen</button>
    </div>
    ${notifs.length ? `<div style="display:flex;flex-direction:column;gap:6px">
      ${notifs.map(n => `
        <div class="notif-item${n.read?'':' unread'}">
          <div class="notif-item-head">
            <div class="notif-type-dot ${n.type}"></div>
            <div class="notif-title">${esc(n.title)}</div>
            <div class="notif-site">${n.read?'gelesen':'NEU'}</div>
          </div>
          ${n.message ? `<div class="notif-msg">${esc(n.message)}</div>` : ''}
          <div class="notif-time">${fmtDate(n.created_at)}</div>
        </div>
      `).join('')}
    </div>` : empty('Keine Benachrichtigungen')}
  `;
}

async function markSiteRead(siteId) {
  await api('/api/notifications/read-all', { method: 'POST', body: { site_id: siteId } });
  reloadTab(siteId, 'notifications');
  loadTopbarStats();
}

// ── OVERVIEW ──────────────────────────────────────────────────────
async function loadOverview() {
  const body = document.getElementById('overview-body');
  body.innerHTML = '<div class="loading">Lade Daten…</div>';
  const data = await api('/api/overview');
  if (!data) { body.innerHTML = noApiWarning(); return; }
  overviewData = data;

  const totalErrors = data.sites.reduce((a,s) => a + s.unresolved_errors, 0);
  const totalTickets = data.sites.reduce((a,s) => a + s.open_tickets, 0);
  const totalUnread = data.sites.reduce((a,s) => a + s.unread_notifications, 0);

  body.innerHTML = `
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Webseiten</div>
        <div class="stat-val green">10</div>
        <div class="stat-sub">Alle aktiv</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Offene Tickets</div>
        <div class="stat-val yellow">${totalTickets}</div>
        <div class="stat-sub">Gesamt offen</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Fehler</div>
        <div class="stat-val red">${totalErrors}</div>
        <div class="stat-sub">Ungelöst</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Benachrichtigungen</div>
        <div class="stat-val blue">${totalUnread}</div>
        <div class="stat-sub">Ungelesen</div>
      </div>
    </div>

    <div style="font-size:13px;font-weight:700;margin-bottom:12px;color:var(--text2);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:0.1em">Alle Webseiten</div>
    <div class="sites-grid">
      ${SITES.map(s => {
        const sdata = data.sites.find(sd => sd.id === s.id) || {};
        const chips = [];
        if (sdata.unresolved_errors > 0) chips.push(`<span class="chip error">⚠ ${sdata.unresolved_errors} Fehler</span>`);
        if (sdata.open_tickets > 0) chips.push(`<span class="chip warn">📋 ${sdata.open_tickets} Tickets</span>`);
        if (sdata.unread_notifications > 0) chips.push(`<span class="chip info">🔔 ${sdata.unread_notifications} Neu</span>`);
        if (!chips.length) chips.push(`<span class="chip ok">✓ Alles OK</span>`);
        return `
          <div class="site-card" onclick="showSite('${s.id}')">
            <div class="site-card-top">
              <div class="site-icon" style="background:${s.color}22;border:1px solid ${s.color}44">${s.icon}</div>
              <div>
                <div class="site-name">${s.name}</div>
                <div class="site-url">${s.url.replace('https://','')}</div>
              </div>
            </div>
            <div class="site-chips">${chips.join('')}</div>
          </div>
        `;
      }).join('')}
    </div>

    ${data.recent_notifications?.length ? `
      <div style="margin-top:24px">
        <div style="font-size:13px;font-weight:700;margin-bottom:12px;color:var(--text2);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:0.1em">Letzte Aktivitäten</div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden">
          ${data.recent_notifications.slice(0,10).map(n => `
            <div style="display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border)">
              <div class="notif-type-dot ${n.type}"></div>
              <div style="flex:1">
                <span style="font-size:12px;font-weight:700">${esc(n.title)}</span>
                ${n.message ? `<span style="font-size:11px;color:var(--text3);margin-left:8px">${esc(n.message).slice(0,50)}</span>` : ''}
              </div>
              <span style="font-size:9px;font-family:'Space Mono',monospace;color:var(--text3)">${SITES.find(s=>s.id===n.site_id)?.name||n.site_id}</span>
              <span style="font-size:9px;font-family:'Space Mono',monospace;color:var(--text3)">${fmtDate(n.created_at)}</span>
            </div>
          `).join('')}
        </div>
      </div>
    ` : ''}
  `;
}

function noApiWarning() {
  return `
    <div style="background:var(--surface);border:1px solid rgba(245,158,11,0.3);border-radius:12px;padding:24px;max-width:600px">
      <div style="font-size:16px;font-weight:800;margin-bottom:8px;color:var(--yellow)">⚠ API nicht verbunden</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.6">
        Der Worker ist noch nicht deployed oder die API_URL ist nicht konfiguriert.<br><br>
        <span style="font-family:'Space Mono',monospace;font-size:11px">→ Sieh dir die README.md für Setup-Anleitung an</span>
      </div>
      <div style="margin-top:16px">
        <div class="sites-grid">
          ${SITES.map(s => `
            <div class="site-card" onclick="showSite('${s.id}')">
              <div class="site-card-top">
                <div class="site-icon" style="background:${s.color}22;border:1px solid ${s.color}44">${s.icon}</div>
                <div><div class="site-name">${s.name}</div><div class="site-url">${s.url.replace('https://','')}</div></div>
              </div>
              <div class="site-chips">${s.tabs.map(t=>`<span class="chip neutral">${t}</span>`).join('')}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

// ── Notifications Panel ───────────────────────────────────────────
async function loadNotifPanel() {
  const list = document.getElementById('notif-list');
  const data = await api('/api/notifications?limit=40');
  if (!data) { list.innerHTML = errMsg(); return; }
  if (!data.length) { list.innerHTML = `<div class="empty"><div class="emoji">🎉</div>Keine Benachrichtigungen</div>`; return; }
  list.innerHTML = data.map(n => `
    <div class="notif-item${n.read?'':' unread'}" onclick="markOneRead(${n.id},this)">
      <div class="notif-item-head">
        <div class="notif-type-dot ${n.type}"></div>
        <div class="notif-title">${esc(n.title)}</div>
        <div class="notif-site">${SITES.find(s=>s.id===n.site_id)?.name||n.site_id}</div>
      </div>
      ${n.message ? `<div class="notif-msg">${esc(n.message).slice(0,80)}</div>` : ''}
      <div class="notif-time">${fmtDate(n.created_at)}</div>
    </div>
  `).join('');
}

async function markOneRead(id, el) {
  await api(`/api/notifications/${id}/read`, { method: 'PATCH' });
  el.classList.remove('unread');
  loadTopbarStats();
}

async function markAllRead() {
  await api('/api/notifications/read-all', { method: 'POST', body: {} });
  loadNotifPanel();
  loadTopbarStats();
}

function toggleNotif() {
  notifOpen = !notifOpen;
  const panel = document.getElementById('notif-panel');
  panel.classList.toggle('open', notifOpen);
  if (notifOpen) loadNotifPanel();
}

// ── Topbar Stats ──────────────────────────────────────────────────
async function loadTopbarStats() {
  const stats = await api('/api/stats');
  if (!stats) return;
  const openTickets = stats.tickets?.find(t=>t.status==='open')?.c || 0;
  const unresolvedErrors = stats.errors?.find(e=>e.resolved===0)?.c || 0;
  const unreadNotifs = stats.notifs?.find(n=>n.read===0)?.c || 0;
  document.getElementById('stat-tickets').textContent = openTickets;
  document.getElementById('stat-errors').textContent = unresolvedErrors;
  const badge = document.getElementById('notif-count');
  if (unreadNotifs > 0) { badge.textContent = unreadNotifs; badge.style.display = 'flex'; }
  else { badge.style.display = 'none'; }
}

// ── Helpers ───────────────────────────────────────────────────────
function reloadTab(siteId, tab) {
  const panel = document.getElementById(`tabp-${siteId}-${tab}`);
  if (panel) { panel.dataset.loaded = ''; loadTab(siteId, tab); }
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(d) {
  if (!d) return '–';
  const date = new Date(d);
  return date.toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit' });
}

function empty(msg) {
  return `<div class="empty"><div class="emoji">📭</div>${msg}</div>`;
}

function errMsg() {
  return `<div class="empty"><div class="emoji">⚡</div>API nicht erreichbar – Worker deployed?</div>`;
}

// ── Init ──────────────────────────────────────────────────────────
buildSidebar();
buildSitePages();
loadOverview();
loadTopbarStats();
setInterval(loadTopbarStats, 30000); // Refresh every 30s
</script>
</body>
</html>
