<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebControl HQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-box" id="login-box">
    <div class="login-logo">
      <div class="login-logo-dot"></div>
      <div class="login-title">WEBCONTROL HQ</div>
    </div>
    <div class="login-sub">Passwort eingeben um fortzufahren</div>
    <div class="login-input-wrap">
      <input
        class="login-input"
        id="login-pw"
        type="password"
        placeholder="••••••••••••"
        autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()"
        autofocus
      >
      <button class="login-eye" id="login-eye-btn" onclick="togglePwVis()" title="Anzeigen">👁</button>
    </div>
    <div class="login-error" id="login-error"></div>
    <button class="btn btn-primary login-btn" onclick="doLogin()" id="login-submit-btn">Einloggen</button>
    <div class="login-hint">Token gilt 1 Stunde · wird automatisch erneuert</div>
  </div>
</div>

<!-- Topbar -->
<div id="topbar">
  <div class="logo">
    <div class="logo-dot"></div>
    WEBCONTROL HQ
  </div>
  <div class="topbar-spacer"></div>
  <div class="topbar-stat">TICKETS <span class="num" id="stat-tickets">–</span></div>
  <div class="topbar-stat">ERRORS <span class="num" id="stat-errors" style="color:var(--red)">–</span></div>
  <div class="topbar-stat">SITES <span class="num" style="color:var(--green)">10</span></div>
  <div id="notif-btn" onclick="toggleNotif()">🔔<span class="notif-badge" id="notif-count" style="display:none">0</span></div>
  <div id="logout-btn" onclick="doLogout()" style="width:36px;height:36px;background:var(--surface);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:border-color 0.2s" onmouseover="this.style.borderColor='var(--red)'" onmouseout="this.style.borderColor='var(--border)'" title="Ausloggen">🚪</div>
</div>

<!-- Layout -->
<div id="layout">
  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Übersicht</div>
      <div class="nav-item active" onclick="showPage('overview')" id="nav-overview">
        <span class="icon">⚡</span> Dashboard
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Webseiten</div>
      <div id="site-nav"></div>
    </div>
  </nav>

  <!-- Main -->
  <div id="main">

    <!-- Overview Page -->
    <div class="page active fade-in" id="page-overview">
      <div class="page-header">
        <div class="page-title">Dashboard</div>
        <div class="page-sub">Alle Projekte auf einen Blick</div>
      </div>
      <div class="page-body scroll-area" id="overview-body">
        <div class="loading">Lade Daten…</div>
      </div>
    </div>

    <!-- Dynamic site pages injected here -->
    <div id="site-pages"></div>

  </div>
</div>

<!-- Notification Panel -->
<div id="notif-panel">
  <div class="notif-panel-head">
    <h3>🔔 Benachrichtigungen</h3>
    <button class="btn btn-ghost btn-sm" onclick="markAllRead()">Alle gelesen</button>
  </div>
  <div class="notif-list" id="notif-list">
    <div class="loading">Lade…</div>
  </div>
</div>

<script>
// ── Auth ───────────────────────────────────────────────────────────
let AUTH_TOKEN = localStorage.getItem('hq_token') || null;

function getToken() { return AUTH_TOKEN; }

function saveToken(t) {
  AUTH_TOKEN = t;
  localStorage.setItem('hq_token', t);
  localStorage.setItem('hq_token_ts', Date.now().toString());
}

function clearToken() {
  AUTH_TOKEN = null;
  localStorage.removeItem('hq_token');
  localStorage.removeItem('hq_token_ts');
}

function isTokenFresh() {
  const ts = parseInt(localStorage.getItem('hq_token_ts') || '0');
  // Token valid for 55 min (5 min before server-side 1h expiry)
  return Date.now() - ts < 55 * 60 * 1000;
}

async function doLogin() {
  const pw = document.getElementById('login-pw').value;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-submit-btn');
  const box = document.getElementById('login-box');
  errEl.textContent = '';
  if (!pw) { errEl.textContent = 'Bitte Passwort eingeben'; return; }
  btn.textContent = 'Prüfe…';
  btn.disabled = true;
  try {
    const r = await fetch(API_URL + '/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });
    const data = await r.json();
    if (!r.ok || !data.token) {
      box.classList.add('login-shake');
      setTimeout(() => box.classList.remove('login-shake'), 400);
      errEl.textContent = data.error || 'Falsches Passwort';
      document.getElementById('login-pw').value = '';
      document.getElementById('login-pw').focus();
    } else {
      saveToken(data.token);
      document.getElementById('login-screen').style.display = 'none';
      initApp();
    }
  } catch(e) {
    errEl.textContent = 'Verbindung fehlgeschlagen';
  }
  btn.textContent = 'Einloggen';
  btn.disabled = false;
}

function togglePwVis() {
  const inp = document.getElementById('login-pw');
  const btn = document.getElementById('login-eye-btn');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

function doLogout() {
  clearToken();
  location.reload();
}

function checkAuth() {
  if (AUTH_TOKEN && isTokenFresh()) {
    document.getElementById('login-screen').style.display = 'none';
    initApp();
  }
  // else: login screen stays visible
}

// ── Config ───────────────────────────────────────────────────────────
// Nach dem Deploy: API_URL auf deine Worker-URL setzen
const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:8787'
  : 'https://webcontrol-hq-api.karol-paschek.workers.dev';

// ── Sites Definition ──────────────────────────────────────────────
const SITES = [
  { id: 'framesphere',  name: 'Frame-Sphere',   url: 'https://frame-sphere.vercel.app', icon: '🔮', color: '#a855f7', tabs: ['support','blog','daten'] },
  { id: 'frametrain',   name: 'FrameTrain',      url: 'https://frame-train.vercel.app',  icon: '🚂', color: '#f59e0b', tabs: ['support','changelog','daten'] },
  { id: 'wordify',      name: 'Wordify',          url: 'https://wordify.pages.dev',        icon: '📝', color: '#22c55e', tabs: ['wortanfragen','daten'] },
  { id: 'flaggues',     name: 'Flaggues',         url: 'https://flaggues.pages.dev',       icon: '🚩', color: '#ef4444', tabs: ['daten'] },
  { id: 'spinselector', name: 'SpinSelector',     url: 'https://spinselector.pages.dev',   icon: '🎰', color: '#06b6d4', tabs: ['vorschläge','daten'] },
  { id: 'brawlmystery', name: 'BrawlMystery',     url: 'https://brawlmystery.pages.dev',   icon: '⚔️', color: '#f97316', tabs: ['changelog','blog','daten'] },
  { id: 'traitora',     name: 'Traitora',         url: 'https://traitora.pages.dev',       icon: '🧠', color: '#8b5cf6', tabs: ['daten'] },
  { id: 'fileflyr',     name: 'FileFlyr',         url: 'https://fileflyr.pages.dev',       icon: '📁', color: '#3b82f6', tabs: ['support','daten'] },
  { id: 'ratelimit',    name: 'Ratelimit API',    url: 'https://ratelimit-api.pages.dev',  icon: '⚡', color: '#10b981', tabs: ['analytics','daten','changelog'] },
  { id: 'framespell',   name: 'FrameSpell',       url: 'https://framespell.pages.dev',     icon: '✨', color: '#60a5fa', tabs: ['analytics','daten','changelog'] },
];

// ── State ─────────────────────────────────────────────────────────
let currentPage = 'overview';
let currentSite = null;
let overviewData = null;
let notifOpen = false;

// ── API helper ────────────────────────────────────────────────────
async function api(path, opts = {}) {
  try {
    const r = await fetch(API_URL + path, {
      headers: {
        'Content-Type': 'application/json',
        'X-Auth-Token': getToken() || '',
        ...opts.headers
      },
      ...opts,
      body: opts.body ? JSON.stringify(opts.body) : undefined,
    });
    if (r.status === 401) {
      clearToken();
      location.reload();
      return null;
    }
    return await r.json();
  } catch(e) {
    console.error('API error:', e);
    return null;
  }
}

// ── initApp (called after login) ──────────────────────────────
function initApp() {
  buildSidebar();
  buildSitePages();
  loadOverview();
  loadTopbarStats();
  setInterval(loadTopbarStats, 30000);
}

// ── Build Sidebar ─────────────────────────────────────────────────
function buildSidebar() {
  const nav = document.getElementById('site-nav');
  nav.innerHTML = SITES.map(s => `
    <div class="nav-item" id="nav-${s.id}" onclick="showSite('${s.id}')">
      <span class="icon">${s.icon}</span>
      <span>${s.name}</span>
      <span class="site-color" style="background:${s.color}"></span>
    </div>
  `).join('');
}

// ── Build Site Pages ──────────────────────────────────────────────
function buildSitePages() {
  const container = document.getElementById('site-pages');
  container.innerHTML = SITES.map(s => `
    <div class="page fade-in" id="page-${s.id}">
      <div class="page-header" style="border-left: 3px solid ${s.color}; padding-left: 25px;">
        <div class="flex items-center gap-12">
          <span style="font-size:22px">${s.icon}</span>
          <div>
            <div class="page-title">${s.name}</div>
            <div class="page-sub"><a href="${s.url}" target="_blank" style="color:var(--text3);text-decoration:none">${s.url}</a></div>
          </div>
        </div>
      </div>
      <div class="site-tabs">
        ${s.tabs.map((t,i) => `<button class="tab-btn${i===0?' active':''}" onclick="showTab('${s.id}','${t}',this)" id="tab-${s.id}-${t}">${tabLabel(t)}</button>`).join('')}
        <button class="tab-btn" onclick="showTab('${s.id}','errors',this)" id="tab-${s.id}-errors">⚠ Errors</button>
        <button class="tab-btn" onclick="showTab('${s.id}','notifications',this)" id="tab-${s.id}-notifications">🔔 Notifs</button>
      </div>
      <div class="scroll-area" style="flex:1;overflow-y:auto" id="tabs-${s.id}">
        ${s.tabs.map((t,i) => `<div class="tab-panel${i===0?' active':''}" id="tabp-${s.id}-${t}"><div class="loading">Lade…</div></div>`).join('')}
        <div class="tab-panel" id="tabp-${s.id}-errors"><div class="loading">Lade…</div></div>
        <div class="tab-panel" id="tabp-${s.id}-notifications"><div class="loading">Lade…</div></div>
      </div>
    </div>
  `).join('');
}

function tabLabel(t) {
  const map = { support:'💬 Support', changelog:'📋 Changelog', blog:'📰 Blog', daten:'📊 Daten', wortanfragen:'📝 Wort-Anfragen', vorschläge:'💡 Vorschläge', analytics:'📈 Analytics', errors:'⚠ Errors', notifications:'🔔 Notifs' };
  return map[t] || t;
}

// ── Navigation ────────────────────────────────────────────────────
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + pageId)?.classList.add('active');
  document.getElementById('nav-' + pageId)?.classList.add('active');
  currentPage = pageId;
  if (pageId === 'overview') loadOverview();
}

function showSite(siteId) {
  currentSite = siteId;
  showPage(siteId);
  const site = SITES.find(s => s.id === siteId);
  if (!site) return;
  // Load first tab
  const firstTab = site.tabs[0];
  loadTab(siteId, firstTab);
  loadTab(siteId, 'errors');
  loadTab(siteId, 'notifications');
}

function showTab(siteId, tab, btn) {
  document.querySelectorAll(`#tabs-${siteId} .tab-panel`).forEach(p => p.classList.remove('active'));
  document.querySelectorAll(`#page-${siteId} .tab-btn`).forEach(b => b.classList.remove('active'));
  document.getElementById(`tabp-${siteId}-${tab}`)?.classList.add('active');
  if (btn) btn.classList.add('active');
  loadTab(siteId, tab);
}

// ── Load Tab Content ──────────────────────────────────────────────
async function loadTab(siteId, tab) {
  const panel = document.getElementById(`tabp-${siteId}-${tab}`);
  if (!panel) return;
  // Only reload if still loading placeholder
  if (!panel.innerHTML.includes('Lade') && panel.dataset.loaded) return;
  panel.dataset.loaded = '1';

  switch(tab) {
    case 'support': await loadSupport(siteId, panel); break;
    case 'changelog': await loadChangelog(siteId, panel); break;
    case 'blog': await loadBlog(siteId, panel); break;
    case 'wortanfragen': await loadWordRequests(panel); break;
    case 'vorschläge': await loadSuggestions(panel); break;
    case 'analytics': await loadAnalytics(siteId, panel); break;
    case 'daten': await loadDaten(siteId, panel); break;
    case 'errors': await loadErrors(siteId, panel); break;
    case 'notifications': await loadSiteNotifs(siteId, panel); break;
  }
}

// ── SUPPORT ───────────────────────────────────────────────────────
async function loadSupport(siteId, panel) {
  const tickets = await api(`/api/support?site_id=${siteId}`);
  if (!tickets) { panel.innerHTML = errMsg(); return; }
  panel.innerHTML = `
    <div class="form-card">
      <div class="form-card-title">Neues Ticket erstellen</div>
      <div class="form-row">
        <div class="form-group"><label>Name</label><input id="s-name-${siteId}" placeholder="Max Mustermann"></div>
        <div class="form-group"><label>E-Mail</label><input id="s-email-${siteId}" type="email" placeholder="max@example.com"></div>
      </div>
      <div class="form-row">
        <div class="form-group form-full"><label>Betreff</label><input id="s-subject-${siteId}" placeholder="Problem beschreiben…"></div>
      </div>
      <div class="form-row">
        <div class="form-group form-full"><label>Nachricht</label><textarea id="s-msg-${siteId}" placeholder="Details…"></textarea></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Priorität</label>
          <select id="s-prio-${siteId}">
            <option value="low">Low</option>
            <option value="normal" selected>Normal</option>
            <option value="high">High</option>
            <option value="urgent">Urgent</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="submitTicket('${siteId}')">Ticket erstellen</button>
    </div>
    <div class="mt-16">
      <div class="actions-bar">
        <div style="font-size:13px;font-weight:700">Tickets (${tickets.length})</div>
        <div class="flex-1"></div>
        <button class="btn btn-ghost btn-sm" onclick="reloadTab('${siteId}','support')">↻ Aktualisieren</button>
      </div>
      ${tickets.length ? ticketTable(tickets, siteId) : empty('Keine Tickets vorhanden')}
    </div>
  `;
}

function ticketTable(tickets, siteId) {
  return `<table class="data-table">
    <thead><tr><th>#</th><th>Betreff</th><th>Von</th><th>Status</th><th>Priorität</th><th>Datum</th><th>Aktionen</th></tr></thead>
    <tbody>${tickets.map(t => `
      <tr>
        <td class="mono">${t.id}</td>
        <td style="max-width:200px"><div style="font-weight:600;font-size:13px">${esc(t.subject)}</div><div class="mono" style="color:var(--text3)">${esc(t.message||'').slice(0,60)}…</div></td>
        <td><div style="font-size:12px">${esc(t.name||'–')}</div><div class="mono" style="color:var(--text3)">${esc(t.email||'')}</div></td>
        <td><span class="badge ${t.status}">${t.status}</span></td>
        <td><span class="badge ${t.priority==='urgent'?'urgent':t.priority==='high'?'in_progress':'draft'}">${t.priority}</span></td>
        <td class="mono" style="color:var(--text3)">${fmtDate(t.created_at)}</td>
        <td>
          <div class="flex gap-8">
            <select onchange="updateTicket(${t.id},'status',this.value,'${siteId}')" style="padding:4px 8px;font-size:11px;width:auto">
              ${['open','in_progress','resolved','closed'].map(s=>`<option value="${s}"${t.status===s?' selected':''}>${s}</option>`).join('')}
            </select>
          </div>
        </td>
      </tr>
    `).join('')}</tbody>
  </table>`;
}

async function submitTicket(siteId) {
  const data = {
    site_id: siteId,
    name: document.getElementById(`s-name-${siteId}`)?.value,
    email: document.getElementById(`s-email-${siteId}`)?.value,
    subject: document.getElementById(`s-subject-${siteId}`)?.value,
    message: document.getElementById(`s-msg-${siteId}`)?.value,
    priority: document.getElementById(`s-prio-${siteId}`)?.value,
  };
  if (!data.subject || !data.message) { alert('Betreff und Nachricht erforderlich'); return; }
  await api('/api/support', { method: 'POST', body: data });
  reloadTab(siteId, 'support');
}

async function updateTicket(id, field, value, siteId) {
  await api(`/api/support/${id}`, { method: 'PATCH', body: { [field]: value } });
  reloadTab(siteId, 'support');
}

// ── CHANGELOG ─────────────────────────────────────────────────────
async function loadChangelog(siteId, panel) {
  const entries = await api(`/api/changelog?site_id=${siteId}`);
  if (!entries) { panel.innerHTML = errMsg(); return; }
  panel.innerHTML = `
    <div class="form-card">
      <div class="form-card-title">Neuer Eintrag</div>
      <div class="form-row">
        <div class="form-group"><label>Version</label><input id="cl-ver-${siteId}" placeholder="v1.2.0"></div>
        <div class="form-group">
          <label>Typ</label>
          <select id="cl-type-${siteId}">
            <option value="feature">✨ Feature</option>
            <option value="fix">🐛 Fix</option>
            <option value="improvement">⚡ Improvement</option>
            <option value="breaking">💥 Breaking</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group form-full"><label>Titel</label><input id="cl-title-${siteId}" placeholder="Was wurde geändert?"></div>
      </div>
      <div class="form-row">
        <div class="form-group form-full"><label>Beschreibung</label><textarea id="cl-desc-${siteId}" placeholder="Details…"></textarea></div>
      </div>
      <div class="flex gap-8">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;text-transform:none;letter-spacing:0;font-size:13px"><input type="checkbox" id="cl-pub-${siteId}"> Direkt veröffentlichen</label>
        <button class="btn btn-primary" onclick="submitChangelog('${siteId}')">Erstellen</button>
      </div>
    </div>
    <div class="mt-16">
      ${entries.length ? changelogList(entries, siteId) : empty('Keine Einträge')}
    </div>
  `;
}

function changelogList(entries, siteId) {
  const typeIcon = { feature:'✨', fix:'🐛', improvement:'⚡', breaking:'💥' };
  return `<div style="display:flex;flex-direction:column;gap:8px">
    ${entries.map(e => `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px">
        <span style="font-size:18px;flex-shrink:0">${typeIcon[e.type]||'📋'}</span>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-family:'Space Mono',monospace;font-size:11px;color:var(--accent2)">${esc(e.version)}</span>
            <span style="font-weight:700;font-size:13px">${esc(e.title)}</span>
            <span class="badge ${e.published?'published':'draft'}">${e.published?'Veröffentlicht':'Draft'}</span>
          </div>
          ${e.description ? `<div style="font-size:12px;color:var(--text2);margin-top:4px">${esc(e.description)}</div>` : ''}
          <div class="mono" style="color:var(--text3);margin-top:4px">${fmtDate(e.created_at)}</div>
        </div>
        <button class="btn btn-danger btn-sm" onclick="deleteChangelog(${e.id},'${siteId}')">✕</button>
      </div>
    `).join('')}
  </div>`;
}

async function submitChangelog(siteId) {
  const data = {
    site_id: siteId,
    version: document.getElementById(`cl-ver-${siteId}`)?.value,
    title: document.getElementById(`cl-title-${siteId}`)?.value,
    description: document.getElementById(`cl-desc-${siteId}`)?.value,
    type: document.getElementById(`cl-type-${siteId}`)?.value,
    published: document.getElementById(`cl-pub-${siteId}`)?.checked,
  };
  if (!data.version || !data.title) { alert('Version und Titel erforderlich'); return; }
  await api('/api/changelog', { method: 'POST', body: data });
  reloadTab(siteId, 'changelog');
}

async function deleteChangelog(id, siteId) {
  if (!confirm('Eintrag löschen?')) return;
  await api(`/api/changelog/${id}`, { method: 'DELETE' });
  reloadTab(siteId, 'changelog');
}

// ── BLOG ──────────────────────────────────────────────────────────
async function loadBlog(siteId, panel) {
  const posts = await api(`/api/blog?site_id=${siteId}`);
  if (!posts) { panel.innerHTML = errMsg(); return; }
  panel.innerHTML = `
    <div class="form-card">
      <div class="form-card-title">Neuer Blogpost</div>
      <div class="form-row">
        <div class="form-group form-full"><label>Titel</label><input id="bl-title-${siteId}" placeholder="Post Titel"></div>
      </div>
      <div class="form-row">
        <div class="form-group form-full"><label>Auszug</label><input id="bl-excerpt-${siteId}" placeholder="Kurze Beschreibung…"></div>
      </div>
      <div class="form-row">
        <div class="form-group form-full"><label>Inhalt (Markdown)</label><textarea id="bl-content-${siteId}" style="min-height:120px" placeholder="## Überschrift\n\nInhalt hier…"></textarea></div>
      </div>
      <div class="flex gap-8">
        <select id="bl-status-${siteId}" style="width:auto">
          <option value="draft">Draft</option>
          <option value="published">Veröffentlichen</option>
        </select>
        <button class="btn btn-primary" onclick="submitBlog('${siteId}')">Erstellen</button>
      </div>
    </div>
    <div class="mt-16">

// ── Topbar Stats ──────────────────────────────────────────────────
async function loadTopbarStats() {
  const stats = await api('/api/stats');
  if (!stats) return;
  const openTickets = stats.tickets?.find(t=>t.status==='open')?.c || 0;
  const unresolvedErrors = stats.errors?.find(e=>e.resolved===0)?.c || 0;
  const unreadNotifs = stats.notifs?.find(n=>n.read===0)?.c || 0;
  document.getElementById('stat-tickets').textContent = openTickets;
  document.getElementById('stat-errors').textContent = unresolvedErrors;
  const badge = document.getElementById('notif-count');
  if (unreadNotifs > 0) { badge.textContent = unreadNotifs; badge.style.display = 'flex'; }
  else { badge.style.display = 'none'; }
}

// ── Helpers ───────────────────────────────────────────────────────
function reloadTab(siteId, tab) {
  const panel = document.getElementById(`tabp-${siteId}-${tab}`);
  if (panel) { panel.dataset.loaded = ''; loadTab(siteId, tab); }
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(d) {
  if (!d) return '–';
  const date = new Date(d);
  return date.toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit' });
}

function empty(msg) {
  return `<div class="empty"><div class="emoji">📭</div>${msg}</div>`;
}

function errMsg() {
  return `<div class="empty"><div class="emoji">⚡</div>API nicht erreichbar – Worker deployed?</div>`;
}

// ── Init ──────────────────────────────────────────────────────────
checkAuth(); // Zeigt Login-Screen oder lädt die App direkt
</script>
</body>
</html>
