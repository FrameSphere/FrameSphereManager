<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traitora – WebControl HQ</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div id="layout">
  <div id="main">

    <div class="page-header" style="border-left:3px solid #8b5cf6;padding-left:25px">
      <div class="flex items-center gap-12">
        <i data-lucide="brain" style="width:22px;height:22px;color:#8b5cf6"></i>
        <div>
          <div class="page-title">Traitora</div>
          <div class="page-sub">
            <a href="https://traitora.pages.dev" target="_blank"
               style="color:var(--text3);text-decoration:none">traitora.pages.dev</a>
          </div>
        </div>
      </div>
    </div>

    <div class="site-tabs">
      <button class="tab-btn active" onclick="showTab('traitora','vorschläge',this)">
        <i data-lucide="lightbulb" style="width:12px;height:12px"></i> Vorschläge
        <span id="nav-badge-vorschläge" class="nav-badge" style="display:none"></span>
      </button>
      <button class="tab-btn" onclick="showTab('traitora','blog',this)">
        <i data-lucide="book-open" style="width:12px;height:12px"></i> Blog
      </button>
      <button class="tab-btn" onclick="showTab('traitora','daten',this)">
        <i data-lucide="bar-chart-2" style="width:12px;height:12px"></i> Daten
      </button>
      <button class="tab-btn" onclick="showTab('traitora','errors',this)">
        <i data-lucide="alert-triangle" style="width:12px;height:12px"></i> Errors
        <span id="nav-badge-errors" class="nav-badge" style="display:none"></span>
      </button>
      <button class="tab-btn" onclick="showTab('traitora','notifications',this)">
        <i data-lucide="bell" style="width:12px;height:12px"></i> Notifs
      </button>
    </div>

    <div class="tab-content-area">
      <div id="tab-vorschläge"    class="tab-panel active"></div>
      <div id="tab-blog"          class="tab-panel"></div>
      <div id="tab-daten"         class="tab-panel"></div>
      <div id="tab-errors"        class="tab-panel"></div>
      <div id="tab-notifications" class="tab-panel"></div>
    </div>

  </div>
</div>

<script src="../js/utils.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/components.js"></script>
<script>initSitePage('traitora', 'vorschläge');</script>
</body>
</html>
