<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FrameTrain – WebControl HQ</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div id="layout">
  <div id="main">

    <div class="page-header" style="border-left:3px solid #f59e0b;padding-left:25px">
      <div class="flex items-center gap-12">
        <i data-lucide="train-front" style="width:22px;height:22px;color:#f59e0b"></i>
        <div>
          <div class="page-title">FrameTrain</div>
          <div class="page-sub">
            <a href="https://frame-train.vercel.app" target="_blank"
               style="color:var(--text3);text-decoration:none">frame-train.vercel.app</a>
          </div>
        </div>
      </div>
    </div>

    <div class="site-tabs">
      <button class="tab-btn active" onclick="showTab('frametrain','support',this)"><i data-lucide="message-square" style="width:12px;height:12px"></i> Support</button>
      <button class="tab-btn"        onclick="showTab('frametrain','changelog',this)"><i data-lucide="clipboard-list" style="width:12px;height:12px"></i> Changelog</button>
      <button class="tab-btn"        onclick="showTab('frametrain','daten',this)"><i data-lucide="bar-chart-2" style="width:12px;height:12px"></i> Daten</button>
      <button class="tab-btn"        onclick="showTab('frametrain','errors',this)"><i data-lucide="alert-triangle" style="width:12px;height:12px"></i> Errors</button>
      <button class="tab-btn"        onclick="showTab('frametrain','notifications',this)"><i data-lucide="bell" style="width:12px;height:12px"></i> Notifs</button>
    </div>

    <div class="tab-content-area">
      <div id="tab-support"       class="tab-panel active"></div>
      <div id="tab-changelog"     class="tab-panel"></div>
      <div id="tab-daten"         class="tab-panel"></div>
      <div id="tab-errors"        class="tab-panel"></div>
      <div id="tab-notifications" class="tab-panel"></div>
    </div>

  </div>
</div>

<script src="../js/utils.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/components.js"></script>
<script>initSitePage('frametrain', 'support');</script>
</body>
</html>
