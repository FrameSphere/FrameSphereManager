<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FileFlyr – WebControl HQ</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div id="layout">
  <div id="main">

    <div class="page-header" style="border-left:3px solid #3b82f6;padding-left:25px">
      <div class="flex items-center gap-12">
        <span style="font-size:22px">📁</span>
        <div>
          <div class="page-title">FileFlyr</div>
          <div class="page-sub">
            <a href="https://fileflyr.pages.dev" target="_blank"
               style="color:var(--text3);text-decoration:none">fileflyr.pages.dev</a>
          </div>
        </div>
      </div>
    </div>

    <div class="site-tabs">
      <button class="tab-btn active" onclick="showTab('fileflyr','support',this)">💬 Support</button>
      <button class="tab-btn"        onclick="showTab('fileflyr','daten',this)">📊 Daten</button>
      <button class="tab-btn"        onclick="showTab('fileflyr','errors',this)">⚠ Errors</button>
      <button class="tab-btn"        onclick="showTab('fileflyr','notifications',this)">🔔 Notifs</button>
    </div>

    <div class="tab-content-area">
      <div id="tab-support"       class="tab-panel active"></div>
      <div id="tab-daten"         class="tab-panel"></div>
      <div id="tab-errors"        class="tab-panel"></div>
      <div id="tab-notifications" class="tab-panel"></div>
    </div>

  </div>
</div>

<script src="../js/utils.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/components.js"></script>
<script>initSitePage('fileflyr', 'support');</script>
</body>
</html>
