<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stride – WebControl HQ</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    /* ── Stride-specific styles ───────────────────────────── */
    .stride-scroll { flex:1; overflow-y:auto; padding:24px 28px; }

    .stride-kpi-grid {
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      margin-bottom:24px;
    }
    .stride-kpi {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:12px;
      padding:14px 16px;
      transition:border-color .2s;
    }
    .stride-kpi:hover { border-color:var(--border2); }
    .stride-kpi-label { font-size:9px; font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:.12em; color:var(--text3); margin-bottom:6px; }
    .stride-kpi-val   { font-size:26px; font-weight:800; letter-spacing:-.03em; line-height:1; }
    .stride-kpi-sub   { font-size:10px; color:var(--text3); margin-top:4px; font-family:'Space Mono',monospace; }

    /* Section */
    .stride-section { margin-bottom:28px; }
    .stride-title {
      font-size:11px; font-family:'Space Mono',monospace; text-transform:uppercase;
      letter-spacing:.12em; color:var(--text3); margin-bottom:14px;
      display:flex; align-items:center; gap:10px;
    }
    .stride-title::after { content:''; flex:1; height:1px; background:var(--border); }

    /* Card */
    .stride-card {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:12px;
      padding:18px 20px;
    }

    /* Tabs */
    .stride-tabs {
      display:flex; gap:2px; margin-bottom:24px;
      background:var(--surface); border:1px solid var(--border);
      border-radius:10px; padding:4px; width:fit-content;
    }
    .stride-tab {
      padding:7px 16px; font-size:11px; font-family:'Space Mono',monospace;
      font-weight:700; text-transform:uppercase; letter-spacing:.08em;
      color:var(--text3); cursor:pointer; border-radius:7px;
      border:none; background:none; transition:all .15s;
    }
    .stride-tab:hover { color:var(--text2); }
    .stride-tab.active { background:var(--surface2); color:#6366f1; border:1px solid var(--border2); }

    /* User table */
    .stride-table { width:100%; border-collapse:collapse; }
    .stride-table th {
      font-size:9px; font-family:'Space Mono',monospace; text-transform:uppercase;
      letter-spacing:.1em; color:var(--text3); padding:0 10px 8px; text-align:left;
      border-bottom:1px solid var(--border);
    }
    .stride-table td { padding:9px 10px; font-size:12px; border-bottom:1px solid rgba(35,46,66,.4); }
    .stride-table tr:last-child td { border-bottom:none; }
    .stride-table tr:hover td { background:rgba(30,38,54,.4); }

    /* Status dots */
    .status-dot { width:7px; height:7px; border-radius:50%; display:inline-block; flex-shrink:0; }
    .status-dot.active   { background:#22c55e; box-shadow:0 0 5px rgba(34,197,94,.5); }
    .status-dot.inactive { background:var(--text3); }
    .status-dot.trial    { background:#f59e0b; }

    /* Mini bar */
    .mini-bar { height:5px; border-radius:2px; background:var(--border2); overflow:hidden; margin-top:3px; }
    .mini-bar-fill { height:100%; border-radius:2px; transition:width .4s ease; }

    /* Plan badge */
    .plan-badge {
      display:inline-block; padding:2px 8px; border-radius:10px;
      font-size:9px; font-weight:700; font-family:'Space Mono',monospace;
    }
    .plan-free  { background:rgba(100,116,139,.15); color:#94a3b8; border:1px solid rgba(100,116,139,.2); }
    .plan-pro   { background:rgba(99,102,241,.15);  color:#818cf8; border:1px solid rgba(99,102,241,.3); }
    .plan-team  { background:rgba(168,85,247,.15);  color:#c084fc; border:1px solid rgba(168,85,247,.3); }

    /* Build status */
    .build-ok   { color:#22c55e; font-family:'Space Mono',monospace; font-size:10px; font-weight:700; }
    .build-fail { color:#ef4444; font-family:'Space Mono',monospace; font-size:10px; font-weight:700; }
    .build-run  { color:#f59e0b; font-family:'Space Mono',monospace; font-size:10px; font-weight:700; }

    /* Info grid */
    .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .info-row  { display:flex; justify-content:space-between; align-items:center; padding:7px 0; border-bottom:1px solid rgba(35,46,66,.4); }
    .info-row:last-child { border-bottom:none; }
    .info-row-label { font-size:11px; color:var(--text3); font-family:'Space Mono',monospace; }
    .info-row-val   { font-size:12px; font-weight:700; color:var(--text1); }

    /* Add btn */
    .add-btn {
      display:inline-flex; align-items:center; gap:6px;
      background:rgba(99,102,241,.15); border:1px solid rgba(99,102,241,.35);
      color:#818cf8; border-radius:8px; padding:7px 14px;
      font-size:11px; font-weight:700; font-family:'Space Mono',monospace;
      cursor:pointer; transition:all .15s; text-transform:uppercase; letter-spacing:.06em;
    }
    .add-btn:hover { background:rgba(99,102,241,.28); }

    /* Modal overlay */
    #stride-modal-overlay {
      display:none; position:fixed; inset:0; z-index:9200;
      background:rgba(0,0,0,.75); backdrop-filter:blur(4px);
      align-items:center; justify-content:center;
    }
    #stride-modal-overlay.open { display:flex; }
    .stride-modal {
      background:var(--surface); border:1px solid var(--border);
      border-radius:16px; padding:0; width:min(480px,96vw);
      overflow:hidden;
    }
    .stride-modal-head {
      padding:18px 22px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .stride-modal-head h3 { font-size:14px; font-weight:800; margin:0; }
    .stride-modal-body { padding:22px; display:flex; flex-direction:column; gap:14px; }
    .stride-modal-foot { padding:14px 22px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; }
    .field-label { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--text3); margin-bottom:5px; }
    .field-input {
      width:100%; box-sizing:border-box;
      background:var(--bg); border:1px solid var(--border);
      border-radius:8px; color:var(--text1); font-family:inherit;
      font-size:12px; padding:9px 12px; outline:none;
      transition:border-color .15s;
    }
    .field-input:focus { border-color:#6366f1; }
    .field-select {
      width:100%; box-sizing:border-box;
      background:var(--bg); border:1px solid var(--border);
      border-radius:8px; color:var(--text1); font-family:inherit;
      font-size:12px; padding:9px 12px; outline:none;
      transition:border-color .15s; cursor:pointer;
    }
    .field-select:focus { border-color:#6366f1; }
  </style>
</head>
<body>
<div id="layout">
  <div id="main">

    <!-- Page Header -->
    <div class="page-header" style="border-left:3px solid #6366f1;padding-left:25px">
      <div class="flex items-center gap-12">
        <i data-lucide="activity" style="width:22px;height:22px;color:#6366f1"></i>
        <div>
          <div class="page-title">Stride</div>
          <div class="page-sub">App-Verwaltung · Benutzer · Builds · Subscriptions</div>
        </div>
        <div class="flex-1"></div>
        <button class="add-btn" onclick="openAddUser()">
          <i data-lucide="user-plus" style="width:12px;height:12px"></i>
          Benutzer hinzufügen
        </button>
        <button class="btn btn-ghost btn-sm" onclick="loadAll()">
          <i data-lucide="refresh-cw" id="refresh-icon" style="width:12px;height:12px"></i>
          Aktualisieren
        </button>
      </div>
    </div>

    <!-- Scroll area -->
    <div class="stride-scroll" id="stride-main">
      <div class="loading">Lade Stride…</div>
    </div>

  </div>
</div>

<!-- Add/Edit User Modal -->
<div id="stride-modal-overlay">
  <div class="stride-modal">
    <div class="stride-modal-head">
      <h3 id="modal-title">Benutzer hinzufügen</h3>
      <button onclick="closeModal()" style="width:28px;height:28px;border-radius:6px;border:none;background:none;cursor:pointer;font-size:16px;color:var(--text3);display:flex;align-items:center;justify-content:center" onmouseover="this.style.background='rgba(255,255,255,.08)'" onmouseout="this.style.background='none'">✕</button>
    </div>
    <div class="stride-modal-body">
      <input type="hidden" id="modal-user-id">
      <div>
        <div class="field-label">Name</div>
        <input class="field-input" id="modal-name" type="text" placeholder="Max Mustermann">
      </div>
      <div>
        <div class="field-label">E-Mail</div>
        <input class="field-input" id="modal-email" type="email" placeholder="max@example.com">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div>
          <div class="field-label">Plan</div>
          <select class="field-select" id="modal-plan">
            <option value="free">Free</option>
            <option value="pro">Pro</option>
            <option value="team">Team</option>
          </select>
        </div>
        <div>
          <div class="field-label">Status</div>
          <select class="field-select" id="modal-status">
            <option value="active">Aktiv</option>
            <option value="trial">Trial</option>
            <option value="inactive">Inaktiv</option>
          </select>
        </div>
      </div>
      <div>
        <div class="field-label">Notiz</div>
        <input class="field-input" id="modal-note" type="text" placeholder="Optionale Notiz…">
      </div>
    </div>
    <div class="stride-modal-foot">
      <button onclick="closeModal()" style="padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;font-size:12px;font-family:inherit">Abbrechen</button>
      <button onclick="saveUser()" style="padding:8px 18px;border-radius:8px;border:none;background:#6366f1;color:#fff;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;display:flex;align-items:center;gap:6px">
        <i data-lucide="save" style="width:12px;height:12px"></i> Speichern
      </button>
    </div>
  </div>
</div>

<script src="../js/utils.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/layout.js"></script>
<script>
// ═══════════════════════════════════════════════════════
//  Stride App Management
// ═══════════════════════════════════════════════════════

const APP_COLOR  = '#6366f1';
const APP_ID     = 'stride';

// Local state (mirrors what we'd get from the API)
let _users  = [];
let _builds = [];
let _activeTab = 'overview';

// ── Mock / local data helpers ────────────────────────────────────
// Until a backend is connected, data lives in localStorage
function loadLocalData() {
  try {
    _users  = JSON.parse(localStorage.getItem('stride_users')  || '[]');
    _builds = JSON.parse(localStorage.getItem('stride_builds') || '[]');
  } catch(_) { _users = []; _builds = []; }
  if (!_users.length)  seedUsers();
  if (!_builds.length) seedBuilds();
}

function saveUsers()  { localStorage.setItem('stride_users',  JSON.stringify(_users));  }
function saveBuilds() { localStorage.setItem('stride_builds', JSON.stringify(_builds)); }

function seedUsers() {
  _users = [
    { id: 1, name: 'Anna Berger',     email: 'anna@example.com',    plan: 'pro',  status: 'active',   note: 'Beta-Testerin',    created_at: '2025-11-12' },
    { id: 2, name: 'Max Schmidt',     email: 'max@example.com',     plan: 'free', status: 'active',   note: '',                 created_at: '2025-12-01' },
    { id: 3, name: 'Laura Hoffmann',  email: 'laura@example.com',   plan: 'team', status: 'active',   note: 'Unternehmenskunde',created_at: '2026-01-15' },
    { id: 4, name: 'Jonas Müller',    email: 'jonas@example.com',   plan: 'pro',  status: 'trial',    note: 'Trial läuft 14d',  created_at: '2026-02-20' },
    { id: 5, name: 'Sara Weiß',       email: 'sara@example.com',    plan: 'free', status: 'inactive', note: 'Kein Login seit 60d',created_at:'2025-10-03' },
  ];
  saveUsers();
}

function seedBuilds() {
  _builds = [
    { id: 1, version: 'v0.9.4', status: 'ok',      branch: 'main',    commit: 'a3f8c12', triggered_by: 'push',    duration: 48,  created_at: '2026-03-10T14:32:00Z' },
    { id: 2, version: 'v0.9.3', status: 'ok',      branch: 'main',    commit: 'b21e77a', triggered_by: 'push',    duration: 51,  created_at: '2026-03-08T09:10:00Z' },
    { id: 3, version: 'v0.9.3-rc1', status: 'fail',branch: 'develop', commit: 'c90a401', triggered_by: 'pr',      duration: 22,  created_at: '2026-03-07T18:05:00Z' },
    { id: 4, version: 'v0.9.2', status: 'ok',      branch: 'main',    commit: 'd55fba3', triggered_by: 'push',    duration: 44,  created_at: '2026-03-05T11:00:00Z' },
    { id: 5, version: 'v0.9.1', status: 'ok',      branch: 'main',    commit: 'e112cd9', triggered_by: 'manual',  duration: 55,  created_at: '2026-03-01T08:20:00Z' },
  ];
  saveBuilds();
}

// ── Load ─────────────────────────────────────────────────────────
function loadAll() {
  const icon = document.getElementById('refresh-icon');
  if (icon) icon.classList.add('spinning');
  loadLocalData();
  setTimeout(() => {
    if (icon) icon.classList.remove('spinning');
    render();
    refreshIcons();
  }, 200);
}

// ── Render ───────────────────────────────────────────────────────
function render() {
  const active = _users.filter(u => u.status === 'active').length;
  const trial  = _users.filter(u => u.status === 'trial').length;
  const pro    = _users.filter(u => u.plan   === 'pro'   || u.plan === 'team').length;
  const lastBuild = _builds[0] || null;

  document.getElementById('stride-main').innerHTML = `

    <!-- KPIs -->
    <div class="stride-kpi-grid">
      <div class="stride-kpi">
        <div class="stride-kpi-label">Benutzer gesamt</div>
        <div class="stride-kpi-val" style="color:${APP_COLOR}">${_users.length}</div>
        <div class="stride-kpi-sub">${active} aktiv · ${trial} Trial</div>
      </div>
      <div class="stride-kpi">
        <div class="stride-kpi-label">Bezahlende User</div>
        <div class="stride-kpi-val" style="color:#22c55e">${pro}</div>
        <div class="stride-kpi-sub">Pro + Team</div>
      </div>
      <div class="stride-kpi">
        <div class="stride-kpi-label">Builds (gesamt)</div>
        <div class="stride-kpi-val" style="color:var(--text1)">${_builds.length}</div>
        <div class="stride-kpi-sub">${_builds.filter(b=>b.status==='ok').length} erfolgreich</div>
      </div>
      <div class="stride-kpi">
        <div class="stride-kpi-label">Letzter Build</div>
        <div class="stride-kpi-val" style="font-size:18px;color:${lastBuild?.status==='ok'?'#22c55e':lastBuild?.status==='fail'?'#ef4444':'#f59e0b'}">${lastBuild ? lastBuild.version : '–'}</div>
        <div class="stride-kpi-sub">${lastBuild ? (lastBuild.status==='ok'?'✓ Erfolgreich':'✗ Fehlgeschlagen') : 'Kein Build'}</div>
      </div>
    </div>

    <!-- Tab Nav -->
    <div class="stride-tabs">
      <button class="stride-tab${_activeTab==='overview'?' active':''}"  onclick="switchTab('overview')">Überblick</button>
      <button class="stride-tab${_activeTab==='users'?' active':''}"     onclick="switchTab('users')">Benutzer</button>
      <button class="stride-tab${_activeTab==='builds'?' active':''}"    onclick="switchTab('builds')">Builds</button>
      <button class="stride-tab${_activeTab==='settings'?' active':''}"  onclick="switchTab('settings')">Einstellungen</button>
    </div>

    <div id="tab-content"></div>
  `;

  renderTab(_activeTab);
}

function switchTab(t) {
  _activeTab = t;
  document.querySelectorAll('.stride-tab').forEach(b => b.classList.remove('active'));
  event?.target?.classList?.add('active');
  renderTab(t);
  refreshIcons();
}

// ── Tab: Overview ─────────────────────────────────────────────────
function renderOverview() {
  const planCounts = { free: 0, pro: 0, team: 0 };
  _users.forEach(u => { planCounts[u.plan] = (planCounts[u.plan]||0)+1; });
  const total = _users.length || 1;

  const recentUsers = [..._users].sort((a,b) => b.created_at.localeCompare(a.created_at)).slice(0,5);
  const recentBuilds = _builds.slice(0,3);

  document.getElementById('tab-content').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">

      <!-- Plan Verteilung -->
      <div class="stride-card">
        <div style="font-size:10px;font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:16px">Plan-Verteilung</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          ${[
            { key:'free',  label:'Free',  color:'#64748b' },
            { key:'pro',   label:'Pro',   color:APP_COLOR },
            { key:'team',  label:'Team',  color:'#a855f7' },
          ].map(p => `
            <div>
              <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                <span style="font-size:11px;color:var(--text2)">${p.label}</span>
                <span style="font-size:11px;font-weight:700;font-family:'Space Mono',monospace">${planCounts[p.key]||0}</span>
              </div>
              <div class="mini-bar"><div class="mini-bar-fill" style="width:${Math.round(((planCounts[p.key]||0)/total)*100)}%;background:${p.color}"></div></div>
            </div>`).join('')}
        </div>
      </div>

      <!-- App Info -->
      <div class="stride-card">
        <div style="font-size:10px;font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:16px">App-Info</div>
        <div>
          ${[
            { label:'App-Name',    val:'Stride' },
            { label:'Version',     val:_builds[0]?.version || '–' },
            { label:'Letzter Build', val:_builds[0] ? new Date(_builds[0].created_at).toLocaleDateString('de-DE') : '–' },
            { label:'Build-Status',val:_builds[0]?.status === 'ok' ? '✓ OK' : _builds[0]?.status === 'fail' ? '✗ Fehler' : '–' },
            { label:'Aktive User', val:_users.filter(u=>u.status==='active').length },
            { label:'Plattform',   val:'Web / iOS / Android' },
          ].map(r => `
            <div class="info-row">
              <span class="info-row-label">${r.label}</span>
              <span class="info-row-val" style="color:${r.label==='Build-Status'&&_builds[0]?.status==='ok'?'#22c55e':r.label==='Build-Status'&&_builds[0]?.status==='fail'?'#ef4444':'var(--text1)'}">${r.val}</span>
            </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- Letzte Benutzer -->
    <div class="stride-section">
      <div class="stride-title">Neueste Benutzer</div>
      <div class="stride-card" style="padding:0;overflow:hidden">
        ${renderUserTable(recentUsers, true)}
      </div>
    </div>

    <!-- Letzte Builds -->
    <div class="stride-section">
      <div class="stride-title">Letzte Builds</div>
      <div class="stride-card" style="padding:0;overflow:hidden">
        ${renderBuildTable(recentBuilds)}
      </div>
    </div>
  `;
}

// ── Tab: Users ────────────────────────────────────────────────────
function renderUsers() {
  document.getElementById('tab-content').innerHTML = `
    <div class="stride-section">
      <div class="stride-title">
        Alle Benutzer
        <button class="add-btn" onclick="openAddUser()" style="margin-left:auto">
          <i data-lucide="user-plus" style="width:12px;height:12px"></i> Hinzufügen
        </button>
      </div>
      <div class="stride-card" style="padding:0;overflow:hidden">
        ${renderUserTable(_users, false)}
      </div>
    </div>
  `;
  refreshIcons();
}

function renderUserTable(users, compact) {
  if (!users.length) return '<div style="padding:40px;text-align:center;color:var(--text3);font-family:\'Space Mono\',monospace;font-size:12px">Keine Benutzer</div>';
  return `<table class="stride-table">
    <thead><tr>
      <th style="padding-left:18px">Name</th>
      <th>E-Mail</th>
      <th>Plan</th>
      <th>Status</th>
      ${!compact ? '<th>Notiz</th>' : ''}
      <th>Seit</th>
      ${!compact ? '<th style="text-align:right;padding-right:18px">Aktion</th>' : ''}
    </tr></thead>
    <tbody>
      ${users.map(u => `<tr>
        <td style="padding-left:18px">
          <div style="display:flex;align-items:center;gap:8px">
            <span class="status-dot ${u.status}"></span>
            <span style="font-weight:700">${esc(u.name)}</span>
          </div>
        </td>
        <td style="font-family:'Space Mono',monospace;font-size:10px;color:var(--text2)">${esc(u.email)}</td>
        <td><span class="plan-badge plan-${u.plan}">${u.plan.toUpperCase()}</span></td>
        <td><span style="font-size:10px;font-family:'Space Mono',monospace;color:${u.status==='active'?'#22c55e':u.status==='trial'?'#f59e0b':'var(--text3)'}">${u.status}</span></td>
        ${!compact ? `<td style="color:var(--text3);font-size:11px;max-width:150px">${esc(u.note||'–')}</td>` : ''}
        <td style="font-family:'Space Mono',monospace;font-size:10px;color:var(--text3)">${u.created_at}</td>
        ${!compact ? `<td style="text-align:right;padding-right:18px">
          <button onclick="openEditUser(${u.id})" style="background:none;border:none;cursor:pointer;color:var(--text3);padding:3px 6px;border-radius:5px;transition:background .12s" onmouseover="this.style.background='rgba(255,255,255,.07)'" onmouseout="this.style.background='none'" title="Bearbeiten">
            <i data-lucide="pencil" style="width:13px;height:13px"></i>
          </button>
          <button onclick="deleteUser(${u.id})" style="background:none;border:none;cursor:pointer;color:#ef4444;padding:3px 6px;border-radius:5px;transition:background .12s" onmouseover="this.style.background='rgba(239,68,68,.1)'" onmouseout="this.style.background='none'" title="Löschen">
            <i data-lucide="trash-2" style="width:13px;height:13px"></i>
          </button>
        </td>` : ''}
      </tr>`).join('')}
    </tbody>
  </table>`;
}

// ── Tab: Builds ───────────────────────────────────────────────────
function renderBuilds() {
  document.getElementById('tab-content').innerHTML = `
    <div class="stride-section">
      <div class="stride-title">Build-Historie</div>
      <div class="stride-card" style="padding:0;overflow:hidden">
        ${renderBuildTable(_builds)}
      </div>
    </div>
  `;
}

function renderBuildTable(builds) {
  if (!builds.length) return '<div style="padding:40px;text-align:center;color:var(--text3);font-family:\'Space Mono\',monospace;font-size:12px">Keine Builds</div>';
  return `<table class="stride-table">
    <thead><tr>
      <th style="padding-left:18px">Version</th>
      <th>Status</th>
      <th>Branch</th>
      <th>Commit</th>
      <th>Auslöser</th>
      <th>Dauer</th>
      <th>Datum</th>
    </tr></thead>
    <tbody>
      ${builds.map(b => `<tr>
        <td style="padding-left:18px;font-weight:700;font-family:'Space Mono',monospace;font-size:11px;color:${APP_COLOR}">${esc(b.version)}</td>
        <td>
          <span class="build-${b.status}">
            ${b.status==='ok'?'✓ OK':b.status==='fail'?'✗ Fail':'⟳ Running'}
          </span>
        </td>
        <td><span style="background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);border-radius:6px;padding:2px 8px;font-size:9px;font-family:'Space Mono',monospace;color:#818cf8">${esc(b.branch)}</span></td>
        <td style="font-family:'Space Mono',monospace;font-size:10px;color:var(--text3)">${esc(b.commit)}</td>
        <td style="font-size:10px;color:var(--text2)">${esc(b.triggered_by)}</td>
        <td style="font-family:'Space Mono',monospace;font-size:10px;color:var(--text3)">${b.duration}s</td>
        <td style="font-family:'Space Mono',monospace;font-size:10px;color:var(--text3)">${new Date(b.created_at).toLocaleDateString('de-DE')}</td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}

// ── Tab: Settings ─────────────────────────────────────────────────
function renderSettings() {
  document.getElementById('tab-content').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="stride-card">
        <div style="font-size:10px;font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:16px">App-Konfiguration</div>
        <div style="display:flex;flex-direction:column;gap:12px">
          <div>
            <div class="field-label">App-Name</div>
            <input class="field-input" type="text" value="Stride" readonly style="opacity:.6;cursor:not-allowed">
          </div>
          <div>
            <div class="field-label">API-Endpunkt</div>
            <input class="field-input" type="text" id="stride-api-url"
              value="${localStorage.getItem('stride_api_url')||''}"
              placeholder="https://api.stride.app">
          </div>
          <div>
            <div class="field-label">API-Key</div>
            <input class="field-input" type="password" id="stride-api-key"
              value="${localStorage.getItem('stride_api_key')||''}"
              placeholder="sk-…">
          </div>
          <button onclick="saveStrideSettings()" style="padding:9px 16px;border-radius:8px;border:none;background:#6366f1;color:#fff;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;align-self:flex-start">Speichern</button>
        </div>
      </div>

      <div class="stride-card">
        <div style="font-size:10px;font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:16px">Benachrichtigungen</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          ${[
            ['Neuer Benutzer',         'notif_new_user'],
            ['Build fehlgeschlagen',   'notif_build_fail'],
            ['Build erfolgreich',      'notif_build_ok'],
            ['Trial läuft ab',         'notif_trial_end'],
            ['Benutzer inaktiv',       'notif_inactive'],
          ].map(([label, key]) => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(35,46,66,.4)">
              <span style="font-size:12px;color:var(--text2)">${label}</span>
              <label style="position:relative;display:inline-block;width:34px;height:18px;cursor:pointer">
                <input type="checkbox" style="opacity:0;width:0;height:0;position:absolute"
                  ${localStorage.getItem(key)==='1'?'checked':''}
                  onchange="localStorage.setItem('${key}',this.checked?'1':'0')">
                <span style="position:absolute;inset:0;background:${localStorage.getItem(key)==='1'?'#6366f1':'var(--border2)'};border-radius:9px;transition:background .2s"></span>
                <span style="position:absolute;left:${localStorage.getItem(key)==='1'?'18':'3'}px;top:3px;width:12px;height:12px;background:#fff;border-radius:50%;transition:left .2s"></span>
              </label>
            </div>`).join('')}
        </div>
      </div>
    </div>

    <div class="stride-card" style="margin-top:16px">
      <div style="font-size:10px;font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:16px">Gefahrenzone</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button onclick="if(confirm('Alle Testdaten zurücksetzen?')){localStorage.removeItem(\'stride_users\');localStorage.removeItem(\'stride_builds\');loadAll()}"
          style="padding:8px 14px;border-radius:8px;border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.08);color:#ef4444;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit">
          Testdaten zurücksetzen
        </button>
      </div>
    </div>
  `;
}

function saveStrideSettings() {
  localStorage.setItem('stride_api_url', document.getElementById('stride-api-url').value.trim());
  localStorage.setItem('stride_api_key', document.getElementById('stride-api-key').value.trim());
  // Small visual feedback
  const btn = event.target;
  btn.textContent = '✓ Gespeichert';
  setTimeout(() => { btn.textContent = 'Speichern'; }, 1500);
}

// ── Tab Dispatcher ────────────────────────────────────────────────
function renderTab(t) {
  switch(t) {
    case 'overview':  renderOverview();  break;
    case 'users':     renderUsers();     break;
    case 'builds':    renderBuilds();    break;
    case 'settings':  renderSettings();  break;
  }
  refreshIcons();
}

// ── User Modal ────────────────────────────────────────────────────
function openAddUser() {
  document.getElementById('modal-title').textContent = 'Benutzer hinzufügen';
  document.getElementById('modal-user-id').value = '';
  document.getElementById('modal-name').value    = '';
  document.getElementById('modal-email').value   = '';
  document.getElementById('modal-plan').value    = 'free';
  document.getElementById('modal-status').value  = 'active';
  document.getElementById('modal-note').value    = '';
  document.getElementById('stride-modal-overlay').classList.add('open');
  refreshIcons();
}

function openEditUser(id) {
  const u = _users.find(x => x.id === id);
  if (!u) return;
  document.getElementById('modal-title').textContent = 'Benutzer bearbeiten';
  document.getElementById('modal-user-id').value = u.id;
  document.getElementById('modal-name').value    = u.name;
  document.getElementById('modal-email').value   = u.email;
  document.getElementById('modal-plan').value    = u.plan;
  document.getElementById('modal-status').value  = u.status;
  document.getElementById('modal-note').value    = u.note || '';
  document.getElementById('stride-modal-overlay').classList.add('open');
  refreshIcons();
}

function closeModal() {
  document.getElementById('stride-modal-overlay').classList.remove('open');
}

function saveUser() {
  const id     = parseInt(document.getElementById('modal-user-id').value) || null;
  const name   = document.getElementById('modal-name').value.trim();
  const email  = document.getElementById('modal-email').value.trim();
  const plan   = document.getElementById('modal-plan').value;
  const status = document.getElementById('modal-status').value;
  const note   = document.getElementById('modal-note').value.trim();

  if (!name || !email) { alert('Name und E-Mail sind Pflichtfelder.'); return; }

  if (id) {
    const idx = _users.findIndex(u => u.id === id);
    if (idx !== -1) Object.assign(_users[idx], { name, email, plan, status, note });
  } else {
    const newId = (_users.reduce((m,u) => Math.max(m,u.id), 0)) + 1;
    _users.push({ id: newId, name, email, plan, status, note, created_at: new Date().toISOString().slice(0,10) });
  }

  saveUsers();
  closeModal();
  render();
  refreshIcons();
}

function deleteUser(id) {
  if (!confirm('Benutzer wirklich löschen?')) return;
  _users = _users.filter(u => u.id !== id);
  saveUsers();
  renderUsers();
  refreshIcons();
}

// ── Expose globals ────────────────────────────────────────────────
window.switchTab    = switchTab;
window.openAddUser  = openAddUser;
window.openEditUser = openEditUser;
window.closeModal   = closeModal;
window.saveUser     = saveUser;
window.deleteUser   = deleteUser;
window.saveStrideSettings = saveStrideSettings;

document.getElementById('stride-modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('stride-modal-overlay')) closeModal();
});

// ── Boot ──────────────────────────────────────────────────────────
injectLoginScreen();
checkAuth(() => {
  initLayout(null);
  loadAll();
});
window.initAfterLogin = () => {
  initLayout(null);
  loadAll();
};
</script>
</body>
</html>
